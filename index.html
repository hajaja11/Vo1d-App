<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --text: #ffffff; --sub: rgba(255,255,255,0.6); }
        
        /* Градиенты для вкладок */
        .buy-theme { background: linear-gradient(135deg, #2d0036 0%, #000000 100%); --acc: #ff00ff; }
        .sell-theme { background: linear-gradient(135deg, #3d1a00 0%, #000000 100%); --acc: #ff9900; }
        .prof-theme { background: linear-gradient(135deg, #1c1c1c 0%, #000000 100%); --acc: #8e8e93; }

        body { font-family: -apple-system, system-ui, sans-serif; color: var(--text); margin: 0; padding: 16px; transition: 0.5s; min-height: 100vh; padding-bottom: 100px; }
        
        .card { background: rgba(255,255,255,0.05); border-radius: 28px; padding: 24px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        h2 { font-size: 24px; font-weight: 800; margin: 0 0 20px 0; display: flex; align-items: center; gap: 10px; }
        
        input { width: 100%; box-sizing: border-box; padding: 18px; margin: 15px 0; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 18px; outline: none; text-align: center; }
        
        .btn { width: 100%; padding: 20px; border: none; border-radius: 20px; background: var(--acc); color: white; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 5px 20px var(--acc); transition: 0.3s; }
        .btn:active { transform: scale(0.96); }

        /* Навигация */
        .nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(255,255,255,0.07); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { background: none; border: none; color: var(--sub); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; font-weight: 600; }
        .nav-btn.active { color: white; }
        .nav-btn span { font-size: 20px; }

        /* Профиль */
        .profile-info { text-align: center; margin-bottom: 20px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; background: #333; margin: 0 auto 15px; border: 3px solid var(--acc); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 18px; text-align: center; }
        .stat-val { font-size: 18px; font-weight: 800; color: var(--acc); }
        .stat-lab { font-size: 11px; color: var(--sub); text-transform: uppercase; margin-top: 4px; }

        .hist-item { background: rgba(0,0,0,0.2); padding: 16px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 10px; padding: 5px 10px; border-radius: 8px; font-weight: 800; }
        .st-Completed { background: #00ff88; color: #000; }
        .st-Progress { background: #ffcc00; color: #000; }

        .doc-btn { background: rgba(255,255,255,0.03); color: white; padding: 15px; border-radius: 15px; text-align: left; margin-top: 10px; font-size: 14px; display: block; text-decoration: none; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="buy-theme" id="bdy">

    <div id="p-buy" class="card">
        <h2>💎 Купить Gold</h2>
        <input type="number" id="i-buy" placeholder="Введите кол-во Gold" oninput="calc('buy')">
        <div style="font-size:36px; font-weight:900; text-align:center; color:#ff00ff; margin:20px 0" id="o-buy">0 ₽</div>
        <button class="btn" onclick="process('buy')">ОФОРМИТЬ ПОКУПКУ</button>
        <div style="margin-top:25px">
            <a href="#" class="doc-btn">📜 Публичная оферта</a>
            <a href="#" class="doc-btn">🛡️ Политика конфиденциальности</a>
        </div>
    </div>

    <div id="p-sell" class="card" style="display:none">
        <h2>💸 Продать Gold</h2>
        <p style="font-size:13px; color:var(--sub); text-align:center">Админ выставит скин, вам нужно будет его выкупить. После покупки мы переведем деньги на карту.</p>
        <input type="number" id="i-sell" placeholder="Кол-во Gold на продажу" oninput="calc('sell')">
        <div style="font-size:28px; font-weight:900; text-align:center; color:#ff9900; margin:20px 0" id="o-sell">Вы получите: 0 ₽</div>
        <button class="btn" onclick="process('sell')">ОСТАВИТЬ ЗАЯВКУ</button>
    </div>

    <div id="p-prof" style="display:none">
        <div class="card profile-info">
            <div class="avatar" id="u-ava">👤</div>
            <h3 id="u-name" style="margin:0">Загрузка...</h3>
            <p id="u-id" style="color:var(--sub); font-size:12px; margin:5px 0">ID: ...</p>
            
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-val" id="s-bought">0G</div><div class="stat-lab">Куплено</div></div>
                <div class="stat-box"><div class="stat-val" id="s-sold">0G</div><div class="stat-lab">Продано</div></div>
            </div>
        </div>
        
        <div class="card">
            <h4 style="margin:0 0 15px 0">История заказов</h4>
            <div id="history-list"></div>
        </div>
    </div>

    <nav class="nav">
        <button id="t-buy" class="nav-btn active" onclick="setTab('buy')"><span>💎</span>Купить</button>
        <button id="t-sell" class="nav-btn" onclick="setTab('sell')"><span>💸</span>Продать</button>
        <button id="t-prof" class="nav-btn" onclick="setTab('prof')"><span>👤</span>Профиль</button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user || {id: 0, first_name: 'Admin'};
        
        document.getElementById('u-id').innerText = "Telegram ID: " + user.id;
        document.getElementById('u-name').innerText = user.first_name;
        if(user.photo_url) document.getElementById('u-ava').innerHTML = `<img src="${user.photo_url}">`;

        function setTab(t) {
            ['buy','sell','prof'].forEach(p => {
                document.getElementById('p-'+p).style.display = p===t?'block':'none';
                document.getElementById('t-'+p).classList.toggle('active', p===t);
            });
            document.getElementById('bdy').className = t + '-theme';
            if(t === 'prof') loadData();
        }

        function calc(t) {
            const v = document.getElementById('i-'+t).value;
            if(t==='buy') document.getElementById('o-buy').innerText = Math.round(v * 0.55) + " ₽";
            else document.getElementById('o-sell').innerText = "Вы получите: " + Math.round(v * 0.45) + " ₽";
        }

        async function process(type) {
            const amt = document.getElementById('i-'+type).value;
            if(!amt || amt < 100) return tg.showAlert("Минимум 100 Gold");
            
            await fetch('https://vo1dminiapp.5487n7z82j.workers.dev', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ method: "direct_order", user_id: user.id, amt: amt, type: type })
            });
            tg.showAlert(type === 'buy' ? "Заказ на покупку создан! Перейдите в бот для оплаты." : "Заявка на продажу принята! Ждите сообщение от админа в боте.");
            tg.close();
        }

        async function loadData() {
            const res = await fetch('https://vo1dminiapp.5487n7z82j.workers.dev', {
                method: 'POST',
                body: JSON.stringify({ method: "get_user_data", user_id: user.id })
            });
            const data = await res.json();
            
            document.getElementById('s-bought').innerText = (data.stats.bought || 0) + "G";
            document.getElementById('s-sold').innerText = (data.stats.sold || 0) + "G";
            
            document.getElementById('history-list').innerHTML = data.history.map(h => `
                <div class="hist-item">
                    <div><b>${h.amt} G</b><br><small>${h.type==='buy'?'Покупка':'Продажа'}</small></div>
                    <div class="status st-${h.status}">${h.status === 'Completed' ? 'ВЫПОЛНЕНО' : 'В ПРОЦЕССЕ'}</div>
                </div>
            `).join('') || "Пока нет заказов";
        }
    </script>
</body>
</html>
