<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VO1D P2P ESCROW</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f0814; --card: rgba(255, 255, 255, 0.05);
            --accent: #ff9d00; --green: #21C07A; --red: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .page { display: none; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Навигация */
        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(15, 8, 20, 0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.4); font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: currentColor; }

        /* Элементы интерфейса */
        .btn { border: none; padding: 12px; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; transition: 0.1s; text-align: center; font-size: 13px; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-primary { background: var(--green); width: 100%; }
        .btn-outline { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); width: 100%; }

        /* Карточка Продавца P2P */
        .offer-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .offer-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .offer-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); background-size: cover; position: relative; }
        .offer-info { flex: 1; }
        .offer-info b { font-size: 14px; display: block; }
        .offer-info span { font-size: 10px; opacity: 0.6; }
        .offer-stats { font-size: 10px; color: var(--green); margin-top: 2px; }

        .offer-body { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .gold-val { font-size: 20px; font-weight: 900; color: #FFD700; }
        .price-val { font-size: 18px; font-weight: bold; color: var(--accent); }

        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .slot { aspect-ratio: 1; background: var(--card); border-radius: 15px; border: 2px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .slot.equipped { border-color: var(--green); box-shadow: 0 0 10px rgba(33, 192, 122, 0.3); }
        .slot b { font-size: 30px; }
        .slot span { font-size: 9px; margin-top: 5px; text-transform: uppercase; }

        /* Action Sheet */
        .sheet { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: flex-end; }
        .sheet-box { width: 100%; background: #1a0f24; border-radius: 25px 25px 0 0; padding: 25px; animation: slide 0.3s ease; }
        @keyframes slide { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Кейсы */
        .case-card { text-align: center; background: rgba(255,255,255,0.03); border-radius: 25px; padding: 30px; }
        .case-img { width: 180px; height: 180px; margin: 15px auto; object-fit: contain; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6)); }

        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; color: white; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>

    <div id="item-sheet" class="sheet" onclick="closeSheet('item-sheet')">
        <div class="sheet-box" onclick="event.stopPropagation()">
            <h3 id="sh-name" style="text-align: center; margin-bottom: 20px;">Название</h3>
            <button id="sh-equip-btn" class="btn btn-primary" style="margin-bottom: 10px;" onclick="toggleEquip()">НАДЕТЬ</button>
            <button class="btn btn-outline" onclick="closeSheet('item-sheet')">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="p2p-sheet" class="sheet" onclick="closeSheet('p2p-sheet')">
        <div class="sheet-box" onclick="event.stopPropagation()">
            <h3 style="text-align: center; margin-bottom: 20px;">ПРОДАТЬ GOLD</h3>
            <input type="number" id="p2p-gold" placeholder="Количество Gold">
            <input type="number" id="p2p-price" placeholder="Цена в VC">
            <p style="font-size: 10px; opacity: 0.5; margin-bottom: 15px; text-align: center;">Комиссия биржи 5% спишется с продавца</p>
            <button class="btn btn-primary" onclick="createOffer()">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <div class="content">
        <div id="p-cases" class="page active">
            <h2 style="text-align: center; margin-bottom: 20px;">МАГАЗИН</h2>
            <div class="case-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <button class="btn" style="background:none; font-size: 24px;" onclick="swipeCase(-1)">◀</button>
                    <h3 id="case-title" style="color: var(--accent);">КЕЙС</h3>
                    <button class="btn" style="background:none; font-size: 24px;" onclick="swipeCase(1)">▶</button>
                </div>
                <img id="case-img" class="case-img" src="">
                <div id="case-price" style="font-size: 28px; font-weight: 900; margin-bottom: 20px;">0 VC</div>
                <button class="btn btn-primary" onclick="openCase()">ОТКРЫТЬ КЕЙС</button>
            </div>
        </div>

        <div id="p-p2p" class="page">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>P2P БИРЖА</h2>
                <button class="btn btn-primary" style="width: auto; padding: 8px 15px;" onclick="openSheet('p2p-sheet')">+ Продать</button>
            </div>
            <div id="market-list">
                </div>
        </div>

        <div id="p-inv" class="page">
            <h2 style="text-align: center; margin-bottom: 20px;">МОЙ СКЛАД</h2>
            <div id="inv-grid" class="inv-grid"></div>
        </div>

        <div id="p-profile" class="page">
            <div style="background: var(--card); padding: 25px; border-radius: 25px; text-align: center;">
                <div id="u-avatar" style="width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent); margin: 0 auto 10px; background-size: cover; background-position: center;"></div>
                <h3 id="u-name">Player</h3>
                <p id="u-id" style="font-size: 11px; opacity: 0.4;" onclick="adminTap()">ID: 000000</p>
                <p id="u-title" style="color: var(--accent); font-weight: bold; margin-top: 5px;">[ Новичок ]</p>
                
                <div style="margin-top: 20px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px;">
                    <p style="opacity: 0.5; font-size: 12px;">Доступно для вывода</p>
                    <h2 id="u-balance" style="font-size: 32px; font-weight: 900;">0 VC</h2>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button class="btn btn-primary" onclick="tg.openTelegramLink('https://t.me/vo1dmenegere2_bot')">ПОПОЛНИТЬ</button>
                        <button class="btn btn-outline" onclick="tg.openTelegramLink('https://t.me/vo1dmenegere2_bot')">ВЫВОД</button>
                    </div>
                </div>
                <p style="margin-top: 15px; font-size: 12px; color: var(--green);">Успешных сделок: <span id="u-deals">0</span></p>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="nav('p-cases', this)"><svg viewBox="0 0 24 24"><path d="M12,18H6V14H12M21,14H12V18H21M12,10V4H21V10M12,10H6V4H12M3,2V22H21V2H3Z"/></svg><span>Кейсы</span></div>
        <div class="nav-item" onclick="nav('p-p2p', this)"><svg viewBox="0 0 24 24"><path d="M12,13A5,5 0 0,1 7,8H9A3,3 0 0,0 12,11A3,3 0 0,0 15,8H17A5,5 0 0,1 12,13M12,3A3,3 0 0,1 15,6H9A3,3 0 0,1 12,3M19,6H17A5,5 0 0,0 12,1A5,5 0 0,0 7,6H5C3.89,6 3,6.89 3,8V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V8C21,6.89 20.11,6 19,6Z"/></svg><span>P2P</span></div>
        <div class="nav-item" onclick="nav('p-inv', this)"><svg viewBox="0 0 24 24"><path d="M12,2L4,5V11.09C4,16.14 7.41,20.85 12,22C16.59,20.85 20,16.14 20,11.09V5L12,2Z"/></svg><span>Склад</span></div>
        <div class="nav-item" onclick="nav('p-profile', this)"><svg viewBox="0 0 24 24"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg><span>Профиль</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // База данных
        let db = JSON.parse(localStorage.getItem('void_final_db')) || {
            balance: 2500,
            deals: 0,
            inventory: [],
            equipped: { title: null, frame: null },
            market: []
        };

        const CASES = [
            { name: "ORIGIN BOX", price: 100, img: "https://cdn3d.iconscout.com/3d/premium/thumb/box-4996160-4159676.png", drops: [
                { name: "Новичок", type: "title", color: "#aaa", icon: "🌱", chance: 70 },
                { name: "Азартный", type: "title", color: "#2196f3", icon: "🎲", chance: 25 },
                { name: "Магнат", type: "title", color: "#FFD700", icon: "💎", chance: 5 }
            ]},
            { name: "NEON CASE", price: 500, img: "https://cdn3d.iconscout.com/3d/premium/thumb/sci-fi-box-5374092-4493399.png", drops: [
                { name: "Неон", type: "frame", color: "#ff00ff", icon: "🔮", chance: 80 },
                { name: "Кибер", type: "frame", color: "#00ffff", icon: "📟", chance: 20 }
            ]}
        ];

        let curC = 0, selIdx = null, aClicks = 0;

        function save() { localStorage.setItem('void_final_db', JSON.stringify(db)); updateUI(); }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function swipeCase(d) {
            curC = (curC + d + CASES.length) % CASES.length;
            const c = CASES[curC];
            document.getElementById('case-title').innerText = c.name;
            document.getElementById('case-price').innerText = c.price + " VC";
            document.getElementById('case-img').src = c.img;
        }

        function openCase() {
            const c = CASES[curC];
            if(db.balance < c.price) return tg.showAlert("Мало VC!");
            db.balance -= c.price;
            
            let r = Math.random()*100, s = 0, win = c.drops[0];
            for(let d of c.drops) { s += d.chance; if(r <= s) { win = d; break; } }
            
            db.inventory.push({...win, id: Date.now()});
            save();
            tg.showPopup({ title: 'ПОБЕДА!', message: `Вы выбили: ${win.name}` });
        }

        function updateUI() {
            const u = tg.initDataUnsafe?.user;
            document.getElementById('u-name').innerText = u?.first_name || "Player";
            document.getElementById('u-id').innerText = "ID: " + (u?.id || "777888");
            document.getElementById('u-balance').innerText = db.balance + " VC";
            document.getElementById('u-deals').innerText = db.deals;
            if(u?.photo_url) document.getElementById('u-avatar').style.backgroundImage = `url('${u.photo_url}')`;

            // Стили профиля
            const t = db.equipped.title;
            document.getElementById('u-title').innerText = t ? `[ ${t.name} ]` : "[ Новичок ]";
            document.getElementById('u-title').style.color = t ? t.color : "#ff9d00";
            
            const f = db.equipped.frame;
            document.getElementById('u-avatar').style.borderColor = f ? f.color : "#ff9d00";

            // Инвентарь
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = '';
            db.inventory.forEach((it, idx) => {
                const isEq = (db.equipped.title?.id === it.id || db.equipped.frame?.id === it.id);
                grid.innerHTML += `
                    <div class="slot ${isEq?'equipped':''}" onclick="openItemSheet(${idx})">
                        <b>${it.icon}</b>
                        <span style="color:${it.color}">${it.name}</span>
                    </div>`;
            });
            for(let i=db.inventory.length; i<9; i++) grid.innerHTML += `<div class="slot" style="opacity:0.1"></div>`;

            // Маркет
            const mList = document.getElementById('market-list');
            mList.innerHTML = db.market.length ? '' : '<p style="text-align:center; opacity:0.3; margin-top:20px;">Предложений пока нет</p>';
            db.market.forEach((m, idx) => {
                mList.innerHTML += `
                    <div class="offer-card">
                        <div class="offer-header">
                            <div class="offer-avatar" style="background-image:url('${m.seller.img}'); border-color:${m.seller.frameColor}"></div>
                            <div class="offer-info">
                                <b>${m.seller.name}</b>
                                <span style="color:${m.seller.titleColor}">[ ${m.seller.title} ]</span>
                                <div class="offer-stats">Сделок: ${m.seller.deals} ✅</div>
                            </div>
                        </div>
                        <div class="offer-body">
                            <div>
                                <div class="gold-val">${m.gold} G</div>
                                <div style="font-size:10px; opacity:0.5">Курс: 1G = ${(m.price/m.gold).toFixed(2)} VC</div>
                            </div>
                            <div style="text-align:right">
                                <div class="price-val">${m.price} VC</div>
                                <button class="btn btn-primary" style="width:auto; padding:5px 15px;" onclick="buyOffer(${idx})">КУПИТЬ</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        // P2P Логика
        function openSheet(id) { document.getElementById(id).style.display = 'flex'; }
        function closeSheet(id) { document.getElementById(id).style.display = 'none'; }

        function createOffer() {
            const gold = parseInt(document.getElementById('p2p-gold').value);
            const price = parseInt(document.getElementById('p2p-price').value);
            if(!gold || !price) return tg.showAlert("Заполните поля!");

            const u = tg.initDataUnsafe?.user;
            db.market.push({
                gold: gold, price: price,
                seller: {
                    name: u?.first_name || "Player",
                    img: u?.photo_url || "",
                    title: db.equipped.title?.name || "Новичок",
                    titleColor: db.equipped.title?.color || "#ff9d00",
                    frameColor: db.equipped.frame?.color || "#ff9d00",
                    deals: db.deals
                }
            });
            save(); closeSheet('p2p-sheet');
            tg.showAlert("Выставлено! Ждите покупателя.");
        }

        function buyOffer(idx) {
            const o = db.market[idx];
            if(db.balance < o.price) return tg.showAlert("Мало VC!");
            
            tg.showConfirm(`Купить ${o.gold}G за ${o.price}VC? Средства будут заморожены до подтверждения.`, (ok) => {
                if(ok) {
                    db.balance -= o.price;
                    db.deals += 1; // Симуляция успешной сделки
                    db.market.splice(idx, 1);
                    save();
                    tg.showPopup({ title: 'УСПЕХ', message: 'Сделка завершена! Gold зачислен.' });
                }
            });
        }

        // Инвентарь
        function openItemSheet(idx) {
            selIdx = idx;
            const it = db.inventory[idx];
            const isEq = (db.equipped.title?.id === it.id || db.equipped.frame?.id === it.id);
            document.getElementById('sh-name').innerText = it.name;
            document.getElementById('sh-name').style.color = it.color;
            document.getElementById('sh-equip-btn').innerText = isEq ? "СНЯТЬ" : "НАДЕТЬ";
            openSheet('item-sheet');
        }

        function toggleEquip() {
            const it = db.inventory[selIdx];
            if(db.equipped[it.type]?.id === it.id) db.equipped[it.type] = null;
            else db.equipped[it.type] = it;
            save(); closeSheet('item-sheet');
        }

        function adminTap() {
            aClicks++;
            if(aClicks >= 5) { db.balance += 10000; save(); tg.showAlert("Бонус +10000 VC"); aClicks = 0; }
        }

        swipeCase(0);
        updateUI();
    </script>
</body>
</html>
