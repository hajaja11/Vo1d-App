<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HASSLE FAMILY HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0e;
            --card-bg: #16161d;
            --accent: #3b82f6; /* Hassle Blue */
            --danger: #ef4444;
            --success: #22c55e;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --grad-family: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); overflow-x: hidden; padding-bottom: 100px; }

        /* --- HEADER --- */
        header {
            padding: 30px 20px;
            background: linear-gradient(to bottom, #1e1e26, var(--bg));
            text-align: center;
        }

        .avatar-main {
            width: 90px; height: 90px;
            border-radius: 25px;
            border: 3px solid var(--accent);
            margin: 0 auto 15px;
            background: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Hassle') center/cover;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .nickname { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; letter-spacing: 1px; }
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 10px;
            background: rgba(59, 130, 246, 0.1); color: var(--accent);
            font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 8px;
        }

        /* --- STATS GRID --- */
        .stats-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; margin-top: -20px;
        }
        .stat-card {
            background: var(--card-bg); border-radius: 20px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card p { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .stat-card b { font-size: 16px; font-family: 'Orbitron'; color: var(--success); }

        /* --- PROPERTY CARDS --- */
        .section-title { padding: 25px 20px 15px; font-size: 14px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        
        .property-scroller { display: flex; gap: 15px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; }
        .property-scroller::-webkit-scrollbar { display: none; }

        .prop-card {
            min-width: 160px; background: var(--card-bg); border-radius: 24px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
        }
        .prop-card::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--accent);
        }
        .prop-icon { font-size: 30px; margin-bottom: 10px; }
        .prop-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .prop-sub { font-size: 10px; color: var(--text-dim); }

        /* --- FAMILY BROADCAST --- */
        .broadcast-box {
            margin: 20px; background: var(--grad-family); border-radius: 25px; padding: 20px;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2);
        }
        .broadcast-box h3 { font-family: 'Orbitron'; font-size: 14px; margin-bottom: 15px; }
        
        .type-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .type-chip {
            padding: 6px 12px; border-radius: 12px; background: rgba(0,0,0,0.2);
            font-size: 10px; font-weight: 700; cursor: pointer; border: 1px solid transparent;
        }
        .type-chip.active { background: #fff; color: #000; }

        textarea {
            width: 100%; background: rgba(0,0,0,0.2); border: none; border-radius: 15px;
            padding: 12px; color: #fff; font-size: 13px; resize: none; outline: none;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-send {
            width: 100%; background: #fff; color: #000; border: none; padding: 12px;
            border-radius: 15px; font-weight: 800; font-size: 14px; transition: 0.3s;
        }
        .btn-send:active { transform: scale(0.97); }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
            background: rgba(11, 11, 14, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .nav-item { color: var(--text-dim); font-size: 10px; text-align: center; }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 24px; height: 24px; display: block; margin: 0 auto 5px; fill: currentColor; }

    </style>
</head>
<body>

    <header>
        <div class="avatar-main"></div>
        <div class="nickname" id="user-nick">HASSLE_PLAYER</div>
        <div class="status-badge">Лидер Семьи</div>
    </header>

    <div class="stats-row">
        <div class="stat-card">
            <p>Баланс</p>
            <b id="user-bal">12,500,000 Р</b>
        </div>
        <div class="stat-card">
            <p>Донат</p>
            <b style="color: var(--accent);">450 H-Coins</b>
        </div>
    </div>

    <div class="section-title">Имущество</div>
    <div class="property-scroller">
        <div class="prop-card">
            <div class="prop-icon">🏎️</div>
            <div class="prop-name">Mclaren 720S</div>
            <div class="prop-sub">Full FT / Винил</div>
        </div>
        <div class="prop-card">
            <div class="prop-icon">🏠</div>
            <div class="prop-name">Коттедж №42</div>
            <div class="prop-sub">Рублевка</div>
        </div>
        <div class="prop-card">
            <div class="prop-icon">📱</div>
            <div class="prop-name">777-777</div>
            <div class="prop-sub">Золотой номер</div>
        </div>
    </div>

    <div class="section-title">Управление Семьей</div>
    <div class="broadcast-box">
        <h3>📢 Рассылка Составам</h3>
        <div class="type-selector" id="msg-types">
            <div class="type-chip active" data-type="СБОР">СБОР</div>
            <div class="type-chip" data-type="КАПТ">КАПТ</div>
            <div class="type-chip" data-type="ВАЖНО">ВАЖНО</div>
        </div>
        <textarea id="broadcast-msg" rows="3" placeholder="Введите текст сообщения для всей семьи..."></textarea>
        <button class="btn-send" onclick="sendBroadcast()">ОТПРАВИТЬ УВЕДОМЛЕНИЕ</button>
    </div>

    <nav>
        <div class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
            Профиль
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
            Карта
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12,13A5,5 0 0,1 7,8H9A3,3 0 0,0 12,11A3,3 0 0,0 15,8H17A5,5 0 0,1 12,13M12,3A3,3 0 0,1 15,6H9A3,3 0 0,1 12,3M19,6H17A5,5 0 0,0 12,1A5,5 0 0,0 7,6H5C3.89,6 3,6.89 3,8V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V8C21,6.89 20.11,6 19,6Z"/></svg>
            Рынок
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Установка данных из Telegram
        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-nick').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();
        }

        // Выбор типа сообщения
        const chips = document.querySelectorAll('.type-chip');
        let currentType = "СБОР";

        chips.forEach(chip => {
            chip.onclick = () => {
                chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentType = chip.getAttribute('data-type');
                tg.HapticFeedback.impactOccurred('light');
            };
        });

        // Функция рассылки
        function sendBroadcast() {
            const msg = document.getElementById('broadcast-msg').value;
            if (!msg) {
                tg.showAlert("Введите текст сообщения!");
                return;
            }

            tg.showConfirm(`Отправить уведомление [${currentType}] всей семье?`, (ok) => {
                if (ok) {
                    // Здесь в будущем будет запрос к твоему боту/серверу
                    tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert("Уведомление отправлено 42 участникам семьи!");
                    document.getElementById('broadcast-msg').value = "";
                }
            });
        }
    </script>
</body>
</html>
