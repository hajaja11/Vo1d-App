<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VO1D ENGINE: INFINITY EDITION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050208;
            --bg-card: #0f0817;
            --bg-item: #180d26;
            --accent: #ff9d00;
            --accent-soft: rgba(255, 157, 0, 0.15);
            --green: #00ff88;
            --red: #ff3b3b;
            --blue: #00d4ff;
            --purple: #9d00ff;
            --rarity-0: #808080; /* Common */
            --rarity-1: #4a9eff; /* Rare */
            --rarity-2: #a347ff; /* Epic */
            --rarity-3: #ff4747; /* Legend */
            --rarity-4: #ffdf00; /* Arcane */
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1, h2, .font-special { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }

        /* --- СКРОЛЛ --- */
        .scrollable { overflow-y: auto; flex: 1; padding: 15px 15px 120px; scroll-behavior: smooth; }
        .scrollable::-webkit-scrollbar { width: 0; }

        /* --- ШАПКА --- */
        header {
            padding: 20px 15px;
            background: linear-gradient(180deg, rgba(15,8,23,1) 0%, rgba(5,2,8,0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .profile-mini { display: flex; align-items: center; gap: 12px; }
        .avatar-box {
            position: relative;
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            padding: 2px;
            box-shadow: 0 0 15px var(--accent-soft);
        }
        .avatar-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .lvl-pill {
            position: absolute; bottom: -5px; right: -5px;
            background: var(--accent); color: #000;
            font-size: 9px; font-weight: 900;
            padding: 2px 6px; border-radius: 8px;
        }

        .balance-box {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 8px 15px; border-radius: 16px;
            text-align: right;
        }
        .balance-box .val { font-size: 18px; font-weight: 900; color: var(--accent); display: block; }
        .balance-box .label { font-size: 9px; opacity: 0.5; letter-spacing: 1px; }

        /* --- СТРАНИЦЫ --- */
        .page { display: none; width: 100%; height: 100%; animation: pageFade 0.4s ease; }
        .page.active { display: block; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- МАГАЗИН & РУЛЕТКА --- */
        .case-container {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
            margin-bottom: 20px;
            position: relative;
        }

        .roulette-wrapper {
            width: 100%;
            height: 150px;
            background: #000;
            border-radius: 20px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            display: none;
            border: 1px solid var(--accent-soft);
        }
        .roulette-track {
            display: flex;
            align-items: center;
            height: 100%;
            will-change: transform;
            padding-left: 50%; /* Центровка */
        }
        .roulette-item {
            min-width: 120px; height: 120px;
            margin: 0 5px; background: var(--bg-item);
            border-radius: 15px; border-bottom: 4px solid #fff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .roulette-item b { font-size: 40px; }
        .roulette-item span { font-size: 10px; font-weight: 700; margin-top: 5px; }
        .roulette-cursor {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 3px; background: var(--accent);
            transform: translateX(-50%); z-index: 10;
            box-shadow: 0 0 20px var(--accent);
        }

        .case-image { width: 220px; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5)); transition: 0.3s; }
        .case-image.spinning { animation: casePulse 0.5s infinite; }
        @keyframes casePulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        /* --- P2P & ГАРАНТ --- */
        .p2p-card {
            background: var(--bg-card);
            border-radius: 24px; padding: 18px;
            margin-bottom: 12px; border-left: 5px solid var(--accent);
            position: relative;
        }
        .status-badge {
            font-size: 10px; font-weight: 800; padding: 4px 8px;
            border-radius: 6px; text-transform: uppercase;
        }
        .status-wait { background: rgba(255, 157, 0, 0.1); color: var(--accent); }
        .status-done { background: rgba(0, 255, 136, 0.1); color: var(--green); }

        .deal-flow {
            display: flex; justify-content: space-between;
            margin: 15px 0; position: relative;
        }
        .deal-flow::before {
            content: ''; position: absolute; top: 12px; left: 0; right: 0;
            height: 2px; background: rgba(255,255,255,0.05); z-index: 1;
        }
        .flow-step {
            width: 25px; height: 25px; border-radius: 50%;
            background: var(--bg-dark); border: 2px solid rgba(255,255,255,0.1);
            z-index: 2; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900;
        }
        .flow-step.active { border-color: var(--accent); color: var(--accent); }
        .flow-step.done { background: var(--green); border-color: var(--green); color: #000; }

        /* --- СКЛАД & ИНВЕНТАРЬ --- */
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .slot {
            aspect-ratio: 1; background: var(--bg-card);
            border-radius: 18px; border: 1px solid rgba(255,255,255,0.03);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; position: relative; transition: 0.2s;
        }
        .slot.eq { border: 2px solid var(--green); background: rgba(0,255,136,0.05); }
        .slot b { font-size: 32px; }
        .slot .rarity-line {
            position: absolute; bottom: 8px; left: 15%; right: 15%;
            height: 3px; border-radius: 2px;
        }

        /* --- РЕЙТИНГ --- */
        .leader-item {
            display: flex; align-items: center; gap: 15px;
            background: var(--bg-card); padding: 12px 18px;
            border-radius: 16px; margin-bottom: 8px;
        }
        .leader-rank { font-family: 'Orbitron'; font-weight: 900; width: 30px; color: var(--accent); }
        .leader-ava { width: 35px; height: 35px; border-radius: 50%; background: #222; }

        /* --- КОНТРАКТЫ --- */
        .contract-box {
            background: linear-gradient(135deg, #180d26 0%, #0a0510 100%);
            border-radius: 25px; padding: 25px; border: 1px dashed var(--purple);
            text-align: center; margin-bottom: 20px;
        }
        .craft-slots { display: flex; justify-content: center; gap: 8px; margin: 15px 0; min-height: 60px; }
        .craft-slot { width: 50px; height: 50px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(157,0,255,0.2); }

        /* --- КНОПКИ & ЭЛЕМЕНТЫ --- */
        .btn {
            border: none; border-radius: 18px; font-weight: 900;
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
            letter-spacing: 1px; width: 100%; padding: 18px;
        }
        .btn-primary { background: linear-gradient(90deg, #ff9d00, #ff5e00); color: #000; box-shadow: 0 8px 20px rgba(255,157,0,0.3); }
        .btn-secondary { background: var(--bg-item); color: #fff; border: 1px solid rgba(255,255,255,0.05); }
        .btn:active { transform: scale(0.96); opacity: 0.9; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: none; align-items: flex-end;
            backdrop-filter: blur(10px);
        }
        .modal-body {
            width: 100%; background: var(--bg-card);
            border-radius: 30px 30px 0 0; padding: 30px 20px 40px;
            transform: translateY(100%); transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-body { transform: translateY(0); }

        /* --- НАВИГАЦИЯ --- */
        nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 85px; background: rgba(15, 8, 23, 0.95);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-bottom: var(--safe-area-bottom); z-index: 500;
        }
        .nav-link {
            display: flex; flex-direction: column; align-items: center;
            color: rgba(255,255,255,0.3); font-size: 10px; font-weight: 800;
        }
        .nav-link svg { width: 24px; height: 24px; margin-bottom: 5px; fill: currentColor; }
        .nav-link.active { color: var(--accent); }

        /* Уведомления */
        .toast-list { position: fixed; top: 20px; left: 20px; right: 20px; z-index: 2000; }
        .toast {
            background: var(--bg-item); border-left: 4px solid var(--accent);
            padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 10px;
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 15px; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="toast-list" id="toasts"></div>

    <header>
        <div class="profile-mini">
            <div class="avatar-box">
                <img id="h-ava" src="https://api.dicebear.com/7.x/bottts/svg?seed=Void" alt="avatar">
                <div class="lvl-pill" id="h-lvl">1</div>
            </div>
            <div>
                <div id="h-name" style="font-weight: 900; font-size: 14px;">PLAYER</div>
                <div style="width: 60px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 4px;">
                    <div id="h-xp-bar" style="width: 30%; height: 100%; background: var(--green); border-radius: 2px;"></div>
                </div>
            </div>
        </div>
        <div class="balance-box">
            <span class="val" id="h-bal">0</span>
            <span class="label">VO1D COINS</span>
        </div>
    </header>

    <div class="scrollable">
        
        <div id="p-shop" class="page active">
            <div class="case-container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
                    <button class="btn-secondary" style="width:40px; padding:10px" onclick="Shop.slide(-1)">‹</button>
                    <h2 id="c-name">ORIGIN BOX</h2>
                    <button class="btn-secondary" style="width:40px; padding:10px" onclick="Shop.slide(1)">›</button>
                </div>
                
                <div id="roulette-box" class="roulette-wrapper">
                    <div class="roulette-cursor"></div>
                    <div id="roulette-track" class="roulette-track"></div>
                </div>

                <img id="c-img" class="case-image" src="">
                
                <div style="margin: 25px 0;">
                    <span style="font-size: 32px; font-weight: 900;" id="c-price">100</span>
                    <span style="color:var(--accent); font-weight:900;">VC</span>
                </div>

                <button class="btn btn-primary" id="btn-open" onclick="Shop.start()">ОТКРЫТЬ</button>
            </div>

            <h3 class="font-special" style="margin-bottom: 15px; font-size: 14px; opacity:0.6">Содержимое кейса</h3>
            <div id="case-content" class="inv-grid"></div>
        </div>

        <div id="p-p2p" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2 class="font-special">P2P ТОРГОВЛЯ</h2>
                <button class="btn-primary" style="width:auto; padding:10px 15px; font-size:11px" onclick="Modals.open('m-sell')">+ ПРОДАТЬ G</button>
            </div>

            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <button class="btn-secondary active" style="padding:10px; font-size:12px" id="tab-m" onclick="P2P.setTab('market')">РЫНОК</button>
                <button class="btn-secondary" style="padding:10px; font-size:12px" id="tab-d" onclick="P2P.setTab('deals')">СДЕЛКИ (<span id="deal-count">0</span>)</button>
            </div>

            <div id="p2p-market"></div>
            <div id="p2p-deals" style="display:none"></div>
        </div>

        <div id="p-inv" class="page">
            <div class="contract-box">
                <h3 class="font-special" style="color:var(--purple)">Контракт обмена</h3>
                <p style="font-size:11px; opacity:0.5; margin-bottom:15px">Выбери 5 предметов одной редкости</p>
                <div class="craft-slots" id="craft-slots">
                    <div class="craft-slot"></div><div class="craft-slot"></div><div class="craft-slot"></div><div class="craft-slot"></div><div class="craft-slot"></div>
                </div>
                <button class="btn btn-secondary" style="padding:10px; font-size:12px" id="btn-craft" onclick="Inventory.craft()" disabled>Скрафтить</button>
            </div>

            <div style="display:flex; gap:8px; margin-bottom:20px; overflow-x:auto;">
                <button class="btn-secondary" style="padding:8px 15px; font-size:11px; width:auto" onclick="Inventory.filter('all')">ВСЕ</button>
                <button class="btn-secondary" style="padding:8px 15px; font-size:11px; width:auto" onclick="Inventory.filter('title')">ТИТУЛЫ</button>
                <button class="btn-secondary" style="padding:8px 15px; font-size:11px; width:auto" onclick="Inventory.filter('frame')">РАМКИ</button>
            </div>

            <div id="inv-grid" class="inv-grid"></div>
        </div>

        <div id="p-stats" class="page">
            <h2 class="font-special" style="margin-bottom:25px">ТОП ИГРОКОВ</h2>
            <div id="leaderboard">
                </div>
        </div>

    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="Modals.close()">
        
        <div class="modal-body" id="m-sell" onclick="event.stopPropagation()">
            <h2 class="font-special" style="margin-bottom:20px; text-align:center">Продать Gold</h2>
            <p style="font-size:12px; opacity:0.6; margin-bottom:5px">Кол-во золота (G)</p>
            <input type="number" id="inp-g" placeholder="500">
            <p style="font-size:12px; opacity:0.6; margin-bottom:5px">Цена в VC</p>
            <input type="number" id="inp-vc" placeholder="1000">
            <button class="btn btn-primary" onclick="P2P.createOffer()">Выставить на рынок</button>
        </div>

        <div class="modal-body" id="m-item" onclick="event.stopPropagation()">
            <div id="mi-icon" style="font-size:80px; text-align:center">💎</div>
            <h2 id="mi-name" class="font-special" style="text-align:center; margin: 15px 0">ITEM NAME</h2>
            <div id="mi-rarity" style="text-align:center; font-weight:900; margin-bottom:25px">RARE</div>
            <div style="display:flex; gap:10px">
                <button class="btn btn-primary" id="mi-btn-action">Надеть</button>
                <button class="btn btn-secondary" onclick="Modals.close()">Назад</button>
            </div>
        </div>

    </div>

    <nav>
        <div class="nav-link active" onclick="Core.nav('p-shop', this)"><svg viewBox="0 0 24 24"><path d="M12,18H6V14H12M21,14H12V18H21M12,10V4H21V10M12,10H6V4H12M3,2V22H21V2H3Z"/></svg>Кейсы</div>
        <div class="nav-link" onclick="Core.nav('p-p2p', this)"><svg viewBox="0 0 24 24"><path d="M12,13A5,5 0 0,1 7,8H9A3,3 0 0,0 12,11A3,3 0 0,0 15,8H17A5,5 0 0,1 12,13M12,3A3,3 0 0,1 15,6H9A3,3 0 0,1 12,3M19,6H17A5,5 0 0,0 12,1A5,5 0 0,0 7,6H5C3.89,6 3,6.89 3,8V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V8C21,6.89 20.11,6 19,6Z"/></svg>P2P</div>
        <div class="nav-link" onclick="Core.nav('p-inv', this)"><svg viewBox="0 0 24 24"><path d="M12,2L4,5V11.09C4,16.14 7.41,20.85 12,22C16.59,20.85 20,16.14 20,11.09V5L12,2Z"/></svg>Склад</div>
        <div class="nav-link" onclick="Core.nav('p-stats', this)"><svg viewBox="0 0 24 24"><path d="M16,11.78L20.24,4.45L21.97,5.45L16.74,14.5L10.23,10.75L5.46,19H22V21H2V3H4V17.54L9.5,8L16,11.78Z"/></svg>Рейтинг</div>
    </nav>

    <script>
        /**
         * VO1D ENGINE v6.0 - NO LIMITS EDITION
         */

        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ГЛОБАЛЬНЫЕ ДАННЫЕ ---
        let DB = JSON.parse(localStorage.getItem('void_infinite_db')) || {
            bal: 1000, xp: 0, lvl: 1, dealsCount: 0,
            inv: [],
            eq: { title: null, frame: null },
            market: [
                { id: 101, seller: 'Bot_Alpha', g: 100, vc: 250, deals: 45, frame: 1 },
                { id: 102, seller: 'CryptoKing', g: 500, vc: 1100, deals: 128, frame: 2 }
            ],
            escrow: [],
            crafting: []
        };

        const CASES = [
            { name: "ORIGIN BOX", price: 100, img: "https://cdn3d.iconscout.com/3d/premium/thumb/box-4996160-4159676.png", drops: [
                { name: "Новичок", icon: "🌱", rarity: 0, type: "title", chance: 65 },
                { name: "Скупщик", icon: "💰", rarity: 1, type: "title", chance: 25 },
                { name: "Bronze Frame", icon: "🧱", rarity: 1, type: "frame", chance: 8 },
                { name: "Legendary", icon: "🔥", rarity: 3, type: "title", chance: 2 }
            ]},
            { name: "EMPIRE CASE", price: 500, img: "https://cdn3d.iconscout.com/3d/premium/thumb/sci-fi-box-5374092-4493399.png", drops: [
                { name: "Imperial", icon: "👑", rarity: 2, type: "title", chance: 70 },
                { name: "Gold Frame", icon: "🟡", rarity: 3, type: "frame", chance: 20 },
                { name: "IMMORTAL", icon: "💎", rarity: 4, type: "title", chance: 10 }
            ]}
        ];

        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        const Core = {
            save() {
                localStorage.setItem('void_infinite_db', JSON.stringify(DB));
                UI.update();
            },
            nav(pageId, el) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
                el.classList.add('active');
                tg.HapticFeedback.impactOccurred('medium');
            },
            toast(msg, type='info') {
                const box = document.getElementById('toasts');
                const t = document.createElement('div');
                t.className = 'toast';
                t.innerHTML = `<span>${msg}</span>`;
                box.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            },
            addXP(amt) {
                DB.xp += amt;
                let nextLvl = Math.floor(Math.sqrt(DB.xp / 100)) + 1;
                if(nextLvl > DB.lvl) {
                    DB.lvl = nextLvl;
                    this.toast("УРОВЕНЬ ПОВЫШЕН!", "success");
                    tg.HapticFeedback.notificationOccurred('success');
                }
                this.save();
            }
        };

        // --- МОДУЛЬ: МАГАЗИН ---
        const Shop = {
            cur: 0,
            isSpinning: false,

            slide(d) {
                if(this.isSpinning) return;
                this.cur = (this.cur + d + CASES.length) % CASES.length;
                this.render();
            },

            render() {
                const c = CASES[this.cur];
                document.getElementById('c-name').innerText = c.name;
                document.getElementById('c-price').innerText = c.price;
                document.getElementById('c-img').src = c.img;

                const content = document.getElementById('case-content');
                content.innerHTML = c.drops.map(d => `
                    <div class="slot">
                        <b>${d.icon}</b>
                        <span style="font-size:8px">${d.name}</span>
                        <div class="rarity-line" style="background:var(--rarity-${d.rarity})"></div>
                    </div>
                `).join('');
            },

            start() {
                const c = CASES[this.cur];
                if(DB.bal < c.price || this.isSpinning) return Core.toast("Не хватает VC!");

                DB.bal -= c.price;
                this.isSpinning = true;
                Core.save();

                const track = document.getElementById('roulette-track');
                const box = document.getElementById('roulette-box');
                const img = document.getElementById('c-img');

                img.classList.add('spinning');
                box.style.display = 'block';
                track.style.transition = 'none';
                track.style.transform = 'translateX(0)';

                // Определяем выигрыш заранее
                let rnd = Math.random() * 100, s = 0, winItem = c.drops[0];
                for(let d of c.drops) { s += d.chance; if(rnd <= s) { winItem = d; break; } }

                // Генерируем ленту (60 предметов)
                let tape = [];
                for(let i=0; i<60; i++) {
                    tape.push(i === 50 ? winItem : c.drops[Math.floor(Math.random()*c.drops.length)]);
                }

                track.innerHTML = tape.map(it => `
                    <div class="roulette-item" style="border-color:var(--rarity-${it.rarity})">
                        <b>${it.icon}</b>
                        <span>${it.name}</span>
                    </div>
                `).join('');

                // Запуск
                setTimeout(() => {
                    const itemWidth = 130; // 120 + 10 margin
                    const finalOffset = (50 * itemWidth); // Позиция 50-го предмета
                    track.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
                    track.style.transform = `translateX(-${finalOffset}px)`;
                }, 100);

                setTimeout(() => {
                    this.isSpinning = false;
                    img.classList.remove('spinning');
                    box.style.display = 'none';
                    this.give(winItem);
                }, 5500);
            },

            give(item) {
                const has = DB.inv.find(x => x.name === item.name);
                if(has) {
                    const comp = Math.floor(CASES[this.cur].price * 0.5);
                    DB.bal += comp;
                    Core.toast(`Повторка! +${comp} VC`);
                } else {
                    DB.inv.push({...item, id: Date.now()});
                    Core.toast(`Выпало: ${item.name}`);
                }
                Core.addXP(20);
                Core.save();
            }
        };

        // --- МОДУЛЬ: P2P ГАРАНТ ---
        const P2P = {
            tab: 'market',

            setTab(t) {
                this.tab = t;
                document.getElementById('p2p-market').style.display = t === 'market' ? 'block' : 'none';
                document.getElementById('p2p-deals').style.display = t === 'deals' ? 'block' : 'none';
                document.getElementById('tab-m').classList.toggle('active', t === 'market');
                document.getElementById('tab-d').classList.toggle('active', t === 'deals');
                this.render();
            },

            createOffer() {
                const g = parseInt(document.getElementById('inp-g').value);
                const vc = parseInt(document.getElementById('inp-vc').value);
                if(!g || !vc) return Core.toast("Заполни все поля");

                DB.market.push({
                    id: Date.now(),
                    seller: tg.initDataUnsafe?.user?.first_name || 'Player',
                    sellerId: tg.initDataUnsafe?.user?.id || 1,
                    g, vc, deals: DB.dealsCount,
                    frame: DB.eq.frame?.rarity || 0
                });
                Core.toast("Объявление выставлено");
                Modals.close();
                Core.save();
            },

            buy(id) {
                const idx = DB.market.findIndex(x => x.id === id);
                const o = DB.market[idx];
                if(DB.bal < o.vc) return Core.toast("Мало VC");

                DB.bal -= o.vc;
                DB.escrow.push({
                    ...o,
                    buyerId: tg.initDataUnsafe?.user?.id || 1,
                    step: 1 // 1: Оплачено, 2: Отправлено, 3: Подтверждено
                });
                DB.market.splice(idx, 1);
                Core.save();
                this.setTab('deals');
            },

            // Логика кнопок внутри сделки
            processDeal(id) {
                const deal = DB.escrow.find(x => x.id === id);
                const myId = tg.initDataUnsafe?.user?.id || 1;

                if(deal.step === 1) {
                    // Только продавец может нажать "Отправил"
                    // В демо-режиме позволяем нажимать для теста
                    deal.step = 2;
                    Core.toast("Статус: Gold отправлен!");
                } else if(deal.step === 2) {
                    // Только покупатель может нажать "Получил"
                    deal.step = 3;
                    DB.dealsCount++;
                    DB.bal += Math.floor(deal.vc * 0.95); // Выплата (минус комиссия)
                    Core.toast("Сделка завершена!");
                    Core.addXP(50);
                    // Удаляем через 2 сек
                    setTimeout(() => {
                        DB.escrow = DB.escrow.filter(x => x.id !== id);
                        Core.save();
                    }, 2000);
                }
                Core.save();
            },

            render() {
                const market = document.getElementById('p2p-market');
                const deals = document.getElementById('p2p-deals');
                document.getElementById('deal-count').innerText = DB.escrow.length;

                market.innerHTML = DB.market.map(o => `
                    <div class="p2p-card" style="border-color:var(--rarity-${o.frame})">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <div>
                                <b style="font-size:12px">${o.seller}</b>
                                <div style="font-size:9px; opacity:0.5">Сделок: ${o.deals}</div>
                            </div>
                            <div class="status-badge status-wait">${o.g} Gold</div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px">
                            <div style="font-weight:900; font-size:20px">${o.vc} <span style="font-size:12px">VC</span></div>
                            <button class="btn-primary" style="width:auto; padding:8px 20px" onclick="P2P.buy(${o.id})">Купить</button>
                        </div>
                    </div>
                `).join('');

                deals.innerHTML = DB.escrow.map(d => `
                    <div class="p2p-card" style="border-color:var(--green)">
                        <div class="deal-flow">
                            <div class="flow-step done">1</div>
                            <div class="flow-step ${d.step>=2?'done':'active'}">2</div>
                            <div class="flow-step ${d.step>=3?'done':''}">3</div>
                        </div>
                        <div style="text-align:center; margin-bottom:15px">
                            <div style="font-size:10px; opacity:0.5">ПЕРЕДАЧА</div>
                            <div style="font-size:22px; font-weight:900">${d.g} GOLD</div>
                        </div>
                        <button class="btn-primary" onclick="P2P.processDeal(${d.id})">
                            ${d.step === 1 ? 'Я ОТПРАВИЛ GOLD' : 'ПОЛУЧЕНИЕ ПОДТВЕРЖДАЮ'}
                        </button>
                    </div>
                `).join('');
            }
        };

        // --- МОДУЛЬ: ИНВЕНТАРЬ & КРАФТ ---
        const Inventory = {
            filterType: 'all',

            filter(t) {
                this.filterType = t;
                this.render();
            },

            addToCraft(id) {
                if(DB.crafting.length >= 5) return;
                const idx = DB.inv.findIndex(x => x.id === id);
                const item = DB.inv[idx];

                // Проверка на одинаковую редкость
                if(DB.crafting.length > 0 && DB.crafting[0].rarity !== item.rarity) {
                    return Core.toast("Нужна одинаковая редкость!");
                }

                DB.crafting.push(item);
                DB.inv.splice(idx, 1);
                this.render();
            },

            craft() {
                const rarity = DB.crafting[0].rarity;
                DB.crafting = [];
                
                // Шанс на редкость выше
                const nextRarity = Math.min(rarity + 1, 4);
                const newItem = {
                    id: Date.now(),
                    name: "Скрафчено",
                    icon: "🧪",
                    rarity: nextRarity,
                    type: "title"
                };
                
                DB.inv.push(newItem);
                Core.toast("Крафт успешен!");
                tg.HapticFeedback.notificationOccurred('success');
                Core.save();
            },

            render() {
                const grid = document.getElementById('inv-grid');
                const slots = document.getElementById('craft-slots');
                const btn = document.getElementById('btn-craft');

                // Отрисовка слотов крафта
                slots.innerHTML = '';
                for(let i=0; i<5; i++) {
                    const it = DB.crafting[i];
                    slots.innerHTML += `<div class="craft-slot" onclick="Inventory.removeFromCraft(${i})">
                        ${it ? `<b>${it.icon}</b>` : ''}
                    </div>`;
                }
                btn.disabled = DB.crafting.length < 5;

                // Отрисовка сетки
                const filtered = DB.inv.filter(x => this.filterType === 'all' || x.type === this.filterType);
                grid.innerHTML = filtered.map(it => {
                    const isEq = (DB.eq.title?.id === it.id || DB.eq.frame?.id === it.id);
                    return `
                        <div class="slot ${isEq?'eq':''}" onclick="Inventory.openItem(${it.id})">
                            <b>${it.icon}</b>
                            <div class="rarity-line" style="background:var(--rarity-${it.rarity})"></div>
                        </div>
                    `;
                }).join('');
            },

            removeFromCraft(i) {
                if(!DB.crafting[i]) return;
                DB.inv.push(DB.crafting[i]);
                DB.crafting.splice(i, 1);
                this.render();
            },

            openItem(id) {
                const it = DB.inv.find(x => x.id === id);
                document.getElementById('mi-name').innerText = it.name;
                document.getElementById('mi-icon').innerText = it.icon;
                document.getElementById('mi-rarity').innerText = ["COMMON","RARE","EPIC","LEGEND","ARCANE"][it.rarity];
                document.getElementById('mi-rarity').style.color = `var(--rarity-${it.rarity})`;

                const btn = document.getElementById('mi-btn-action');
                const isEq = (DB.eq.title?.id === it.id || DB.eq.frame?.id === it.id);
                btn.innerText = isEq ? "СНЯТЬ" : "НАДЕТЬ";
                
                btn.onclick = () => {
                    if(isEq) DB.eq[it.type] = null;
                    else DB.eq[it.type] = it;
                    Modals.close();
                    Core.save();
                };

                // Кнопка для добавления в крафт
                const extraBtn = document.createElement('button');
                extraBtn.className = "btn btn-secondary";
                extraBtn.style.marginTop = "10px";
                extraBtn.innerText = "В КОНТРАКТ";
                extraBtn.onclick = () => {
                    this.addToCraft(id);
                    Modals.close();
                };
                
                const box = document.getElementById('m-item');
                if(box.children.length > 4) box.removeChild(box.lastChild);
                box.appendChild(extraBtn);

                Modals.open('m-item');
            }
        };

        // --- МОДУЛЬ: UI ОБНОВЛЕНИЕ ---
        const UI = {
            update() {
                document.getElementById('h-bal').innerText = DB.bal.toLocaleString();
                document.getElementById('h-lvl').innerText = DB.lvl;
                document.getElementById('h-name').innerText = (tg.initDataUnsafe?.user?.first_name || 'PLAYER').toUpperCase();
                
                const xpStart = (DB.lvl - 1)**2 * 100;
                const xpEnd = DB.lvl**2 * 100;
                const prog = ((DB.xp - xpStart) / (xpEnd - xpStart)) * 100;
                document.getElementById('h-xp-bar').style.width = prog + "%";

                if(tg.initDataUnsafe?.user?.photo_url) {
                    document.getElementById('h-ava').src = tg.initDataUnsafe.user.photo_url;
                }

                // Применяем рамку
                const frameColor = DB.eq.frame ? `var(--rarity-${DB.eq.frame.rarity})` : 'var(--accent)';
                document.getElementById('h-ava').parentElement.style.borderColor = frameColor;

                Inventory.render();
                P2P.render();
                this.renderLeaderboard();
            },

            renderLeaderboard() {
                const list = document.getElementById('leaderboard');
                const mocks = [
                    { name: 'Dark_Slayer', bal: 55400, deals: 450 },
                    { name: 'Gamer777', bal: 32100, deals: 210 },
                    { name: 'GoldHunter', bal: 28000, deals: 190 }
                ];
                
                list.innerHTML = mocks.map((m, i) => `
                    <div class="leader-item">
                        <div class="leader-rank">#${i+1}</div>
                        <div class="leader-ava"></div>
                        <div style="flex:1">
                            <div style="font-weight:700; font-size:14px">${m.name}</div>
                            <div style="font-size:10px; opacity:0.5">${m.deals} сделок</div>
                        </div>
                        <div style="text-align:right; font-weight:900; color:var(--accent)">${m.bal}</div>
                    </div>
                `).join('');
            }
        };

        // --- МОДУЛЬ: МОДАЛКИ ---
        const Modals = {
            open(id) {
                document.getElementById('modal-overlay').classList.add('active');
                document.querySelectorAll('.modal-body').forEach(b => b.style.display = 'none');
                document.getElementById(id).style.display = 'block';
            },
            close() {
                document.getElementById('modal-overlay').classList.remove('active');
            }
        };

        // Инициализация
        Shop.render();
        UI.update();
        Core.toast("Система VO1D инициализирована");

    </script>
</body>
</html>
