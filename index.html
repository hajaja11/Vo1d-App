<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0b0b; --text: #ffffff; --acc: #ff00ff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 24px; margin-top: 20px; }
        input { width: 100%; box-sizing: border-box; padding: 16px; margin: 12px 0; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; font-size: 16px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 16px; background: var(--acc); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .status { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="title">💎 Купить Gold</h2>
        <input type="number" id="amount" placeholder="Количество Gold">
        <button class="btn" onclick="order()">ОФОРМИТЬ ЗАКАЗ</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        async function order() {
            const amt = document.getElementById('amount').value;
            const status = document.getElementById('status');
            
            if (!amt || amt < 100) return alert("Минимум 100G");

            status.innerText = "⏳ Отправка...";
            
            // Прямой запрос к твоему Worker
            // ВАЖНО: Мы отправляем сигнал боту через специальный API
            const data = {
                user_id: tg.initDataUnsafe.user?.id,
                query_id: tg.initDataUnsafe.query_id, // Ключ для ответа
                amt: amt
            };

            // Закрываем приложение, бот ответит сам через ответ на запрос
            tg.sendData(JSON.stringify({type: 'buy', amt: amt})); 
            
            // Если sendData опять не сработает, приложение просто закроется через 2 сек
            setTimeout(() => { tg.close(); }, 500);
        }
    </script>
</body>
</html>
