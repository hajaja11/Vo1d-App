<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VO1D PREMIUM STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #08040a; --panel: #160d1f; --accent: #ff9d00;
            --green: #00ff88; --red: #ff3333; --blue: #00d9ff;
            --rarity-0: #9e9e9e; --rarity-1: #2196f3; --rarity-2: #a020f0; --rarity-3: #ff0055;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Скроллбары */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .content { flex: 1; overflow-y: auto; padding: 15px 15px 100px; position: relative; }
        .page { display: none; } .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Header */
        header { padding: 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(255,157,0,0.2); z-index: 10; }
        .user-block { display: flex; align-items: center; gap: 10px; }
        .lvl-badge { background: var(--accent); color: black; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; }
        
        /* Кейсы и Рулетка */
        .case-card { background: linear-gradient(145deg, #1d1129, #13091a); border-radius: 30px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .case-img { width: 200px; height: 200px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); transition: 0.3s; }
        .case-img.spin-anim { animation: caseShake 0.5s infinite; }
        @keyframes caseShake { 0% { transform: scale(1); } 50% { transform: scale(1.05) rotate(2deg); } 100% { transform: scale(1); } }

        .roulette-container { display: none; width: 100%; height: 130px; background: #000; border-radius: 20px; position: relative; overflow: hidden; border: 2px solid var(--accent); margin: 20px 0; }
        .track { display: flex; align-items: center; height: 100%; will-change: transform; }
        .r-item { min-width: 110px; height: 110px; margin: 0 5px; background: var(--panel); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 4px solid; }
        .r-item b { font-size: 35px; margin-bottom: 5px; }
        .r-item span { font-size: 11px; font-weight: bold; text-align: center; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--accent); z-index: 5; transform: translateX(-50%); box-shadow: 0 0 20px var(--accent); }

        /* P2P Гарант */
        .deal-card { background: var(--panel); border-radius: 20px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--accent); position: relative; overflow: hidden; }
        .status-line { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .step { opacity: 0.3; font-weight: bold; } .step.active { opacity: 1; color: var(--green); }
        .p2p-info { display: flex; justify-content: space-between; align-items: center; }
        .g-amount { font-size: 24px; font-weight: 900; color: #FFD700; }
        
        /* Склад & Фильтры */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .f-btn { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 6px 15px; border-radius: 10px; font-size: 12px; white-space: nowrap; }
        .f-btn.active { border-color: var(--accent); background: rgba(255,157,0,0.1); }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .slot { aspect-ratio: 1; background: var(--panel); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .slot.eq { border: 2px solid var(--green); background: rgba(0,255,136,0.05); }
        .slot b { font-size: 30px; }

        /* Навигация */
        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(22,13,31,0.98); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.4); font-size: 11px; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }
        .nav-item svg { width: 26px; height: 26px; margin-bottom: 4px; }

        /* Системные штуки */
        .btn { border: none; padding: 16px; border-radius: 18px; font-weight: 900; color: white; width: 100%; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-main { background: linear-gradient(to right, #ff9d00, #ff5e00); box-shadow: 0 5px 15px rgba(255,157,0,0.3); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: flex-end; }
        .modal { width: 100%; background: #1c1226; border-radius: 30px 30px 0 0; padding: 30px; }
        canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 2001; }
    </style>
</head>
<body>

    <header>
        <div class="user-block">
            <div id="u-ava" style="width:40px; height:40px; border-radius:50%; background-size:cover; border:2px solid var(--accent)"></div>
            <div>
                <div id="u-name" style="font-weight:bold; font-size:14px">Player</div>
                <div style="display:flex; align-items:center; gap:5px">
                    <span class="lvl-badge">LVL <span id="u-lvl">1</span></span>
                    <div style="width:60px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px">
                        <div id="u-xp-bar" style="width:0%; height:100%; background:var(--green); border-radius:2px"></div>
                    </div>
                </div>
            </div>
        </div>
        <div style="text-align:right">
            <div style="font-size:10px; opacity:0.5">Баланс VC</div>
            <div id="u-bal" style="font-weight:900; color:var(--accent); font-size:18px">0</div>
        </div>
    </header>

    <div class="content">
        <div id="p-cases" class="page active">
            <div class="case-card">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <button onclick="moveCase(-1)" style="background:none; border:none; color:white; font-size:30px">‹</button>
                    <h2 id="c-name" style="text-transform:uppercase; letter-spacing:2px">ORIGIN</h2>
                    <button onclick="moveCase(1)" style="background:none; border:none; color:white; font-size:30px">›</button>
                </div>
                <div class="roulette-container" id="r-box">
                    <div class="pointer"></div>
                    <div class="track" id="r-track"></div>
                </div>
                <img id="c-img" class="case-img" src="">
                <h1 id="c-price" style="margin: 20px 0; font-size: 35px;">0</h1>
                <button class="btn btn-main" id="btn-open" onclick="startSpin()">ОТКРЫТЬ КЕЙС</button>
            </div>
        </div>

        <div id="p-p2p" class="page">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px">
                <h2>P2P ГАРАНТ</h2>
                <button class="f-btn" onclick="openModal('m-sell')">Выставить Gold</button>
            </div>
            <div id="active-deals"></div>
            <hr style="opacity:0.1; margin:20px 0">
            <div id="market-list"></div>
        </div>

        <div id="p-inv" class="page">
            <h2>ИНВЕНТАРЬ</h2>
            <div class="filter-bar">
                <button class="f-btn active" onclick="filterInv('all', this)">Все</button>
                <button class="f-btn" onclick="filterInv('title', this)">Титулы</button>
                <button class="f-btn" onclick="filterInv('frame', this)">Рамки</button>
            </div>
            <div class="inv-grid" id="inv-grid"></div>
        </div>

        <div id="p-profile" class="page">
            <div style="background:var(--panel); padding:30px; border-radius:30px; text-align:center">
                <div id="p-ava-big" style="width:100px; height:100px; border-radius:50%; margin:0 auto 15px; border:4px solid var(--accent); background-size:cover"></div>
                <h2 id="p-name">Player</h2>
                <div id="p-title" style="color:var(--accent); font-weight:bold; margin-top:5px">[ НОВИЧОК ]</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:25px">
                    <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:20px">
                        <div style="font-size:10px; opacity:0.5">СДЕЛОК</div>
                        <div id="p-deals" style="font-size:20px; font-weight:900">0</div>
                    </div>
                    <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:20px">
                        <div style="font-size:10px; opacity:0.5">УРОВЕНЬ</div>
                        <div id="p-lvl-val" style="font-size:20px; font-weight:900">1</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-bg" class="overlay" onclick="closeModal()">
        <div class="modal" id="m-sell" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:20px">Продажа Gold</h3>
            <input type="number" id="inp-g" placeholder="Количество Gold">
            <input type="number" id="inp-vc" placeholder="Цена в VC">
            <button class="btn btn-main" onclick="createOffer()">Опубликовать</button>
        </div>
        <div class="modal" id="m-item" onclick="event.stopPropagation()">
            <h2 id="mi-name" style="text-align:center; margin-bottom:20px">Предмет</h2>
            <button class="btn btn-main" id="mi-btn" style="margin-bottom:10px">Надеть</button>
            <button class="btn f-btn" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <canvas id="confetti"></canvas>
    <nav>
        <div class="nav-item active" onclick="nav('p-cases', this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5,3H19A2,2 0 0,1 21,5V19A2,2 0 0,1 19,21H5A2,2 0 0,1 3,19V5A2,2 0 0,1 5,3M5,5V19H19V5H5M7,7H11V11H7V7M13,7H17V11H13V7M7,13H11V17H7V13M13,13H17V17H13V13Z"/></svg>Кейсы</div>
        <div class="nav-item" onclick="nav('p-p2p', this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12,15V18H9V20H12V23H14V20H17V18H14V15H12M7,2V5H10V7H7V10H5V7H2V5H5V2H7M17,2V5H20V7H17V10H15V7H12V5H15V2H17Z"/></svg>P2P</div>
        <div class="nav-item" onclick="nav('p-inv', this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"/></svg>Склад</div>
        <div class="nav-item" onclick="nav('p-profile', this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>Профиль</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ДАННЫЕ ---
        let db = JSON.parse(localStorage.getItem('void_v5')) || {
            bal: 10000, xp: 0, deals: 0,
            inv: [], eq: { title: null, frame: null },
            market: [], escrow: []
        };

        const CASES = [
            { name: "Origin", price: 100, img: "https://cdn3d.iconscout.com/3d/premium/thumb/box-4996160-4159676.png", drops: [
                { name: "Новичок", icon: "🌱", rarity: 0, type: "title", chance: 60 },
                { name: "Удачливый", icon: "🍀", rarity: 1, type: "title", chance: 30 },
                { name: "Серебро", icon: "🥈", rarity: 2, type: "frame", chance: 9 },
                { name: "Void", icon: "💠", rarity: 3, type: "title", chance: 1 }
            ]},
            { name: "Neon", price: 500, img: "https://cdn3d.iconscout.com/3d/premium/thumb/sci-fi-box-5374092-4493399.png", drops: [
                { name: "Неон", icon: "🔮", rarity: 2, type: "frame", chance: 80 },
                { name: "Кибер", icon: "⚡", rarity: 3, type: "title", chance: 20 }
            ]}
        ];

        let curC = 0, isSpin = false, sIdx = null;

        // --- ЗВУКОВОЙ ДВИЖОК ---
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        function playTick() {
            const osc = audio.createOscillator();
            const gain = audio.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(150, audio.currentTime);
            gain.gain.setValueAtTime(0.1, audio.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.1);
            osc.connect(gain); gain.connect(audio.destination);
            osc.start(); osc.stop(audio.currentTime + 0.1);
        }

        // --- СИСТЕМА УРОВНЕЙ ---
        function addXp(amt) {
            db.xp += amt;
            const lvl = Math.floor(Math.sqrt(db.xp / 100)) + 1;
            const currentLvlStartXP = (lvl - 1) ** 2 * 100;
            const nextLvlXP = lvl ** 2 * 100;
            const progress = ((db.xp - currentLvlStartXP) / (nextLvlXP - currentLvlStartXP)) * 100;
            document.getElementById('u-xp-bar').style.width = progress + "%";
            document.getElementById('u-lvl').innerText = lvl;
            document.getElementById('p-lvl-val').innerText = lvl;
            save();
        }

        // --- ГАРАНТ ESCROW ---
        function createOffer() {
            const g = parseInt(document.getElementById('inp-g').value);
            const vc = parseInt(document.getElementById('inp-vc').value);
            if(!g || !vc) return;
            const u = tg.initDataUnsafe?.user;
            db.market.push({
                id: Date.now(), g, vc,
                seller: u?.first_name || "Player",
                sId: u?.id || 0,
                deals: db.deals,
                f: db.eq.frame?.rarity || 0
            });
            save(); closeModal();
        }

        function buyGold(idx) {
            const o = db.market[idx];
            if(db.bal < o.vc) return tg.showAlert("Мало VC!");
            db.bal -= o.vc;
            db.escrow.push({ ...o, step: 1, buyerId: tg.initDataUnsafe?.user?.id });
            db.market.splice(idx, 1);
            save();
        }

        function updateStep(idx) {
            const d = db.escrow[idx];
            const uId = tg.initDataUnsafe?.user?.id;
            if(d.step === 1 && d.sId == uId) d.step = 2; // Продавец отправил
            else if(d.step === 2 && d.buyerId == uId) { // Покупатель получил
                d.step = 3;
                db.deals++;
                db.bal += Math.floor(d.vc * 0.95); // Выплата продавцу (эмуляция)
                addXp(50);
                setTimeout(() => { db.escrow.splice(idx, 1); save(); }, 2000);
            }
            save();
        }

        // --- РУЛЕТКА ---
        function startSpin() {
            const c = CASES[curC];
            if(db.bal < c.price || isSpin) return;
            db.bal -= c.price;
            isSpin = true;
            document.getElementById('c-img').style.display = 'none';
            document.getElementById('r-box').style.display = 'block';
            
            const track = document.getElementById('r-track');
            track.innerHTML = ''; track.style.transition = 'none'; track.style.transform = 'translateX(0)';
            
            let rand = Math.random()*100, s = 0, win = c.drops[0];
            for(let d of c.drops) { s += d.chance; if(rand <= s) { win = d; break; } }

            for(let i=0; i<50; i++) {
                const it = (i === 45) ? win : c.drops[Math.floor(Math.random()*c.drops.length)];
                track.innerHTML += `<div class="r-item" style="border-color:var(--rarity-${it.rarity})"><b>${it.icon}</b><span>${it.name}</span></div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)';
                track.style.transform = `translateX(-${45*120 - 150}px)`;
                // Эмуляция тиков
                let ticks = 0;
                const interval = setInterval(() => {
                    ticks++; playTick();
                    if(ticks > 40) clearInterval(interval);
                }, 100);
            }, 50);

            setTimeout(() => {
                isSpin = false;
                processWin(win, c.price);
                document.getElementById('c-img').style.display = 'inline-block';
                document.getElementById('r-box').style.display = 'none';
            }, 5500);
        }

        function processWin(it, cost) {
            const dup = db.inv.find(x => x.name === it.name) || (db.eq.title?.name == it.name);
            if(dup) {
                const cash = Math.floor(cost * 0.4);
                db.bal += cash;
                tg.showAlert(`Повторка! +${cash} VC`);
            } else {
                db.inv.push({...it, id: Date.now()});
                if(it.rarity >= 2) launchConfetti();
            }
            addXp(20);
            save();
        }

        // --- UI ---
        function save() { localStorage.setItem('void_v5', JSON.stringify(db)); render(); }

        function render() {
            document.getElementById('u-bal').innerText = db.bal;
            document.getElementById('u-name').innerText = tg.initDataUnsafe?.user?.first_name || "Player";
            document.getElementById('p-name').innerText = tg.initDataUnsafe?.user?.first_name || "Player";
            document.getElementById('p-deals').innerText = db.deals;
            const uAva = tg.initDataUnsafe?.user?.photo_url;
            if(uAva) {
                document.getElementById('u-ava').style.backgroundImage = `url('${uAva}')`;
                document.getElementById('p-ava-big').style.backgroundImage = `url('${uAva}')`;
            }

            // Склад
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = '';
            db.inv.forEach((it, i) => {
                const isEq = (db.eq.title?.id === it.id || db.eq.frame?.id === it.id);
                grid.innerHTML += `<div class="slot ${isEq?'eq':''}" onclick="openItem(${i})"><b>${it.icon}</b><div style="font-size:8px; color:var(--rarity-${it.rarity})">${it.name}</div></div>`;
            });

            // Маркет
            const mList = document.getElementById('market-list');
            mList.innerHTML = db.market.map((o, i) => `
                <div class="deal-card" style="border-color:var(--rarity-${o.f})">
                    <div style="font-size:12px; opacity:0.6">${o.seller} • сделок: ${o.deals}</div>
                    <div class="p2p-info">
                        <div class="g-amount">${o.g} G</div>
                        <button class="f-btn" style="background:var(--accent); color:black" onclick="buyGold(${i})">${o.vc} VC</button>
                    </div>
                </div>`).join('');

            // Активные сделки
            const aList = document.getElementById('active-deals');
            aList.innerHTML = db.escrow.map((d, i) => `
                <div class="deal-card" style="border-color:var(--green)">
                    <div class="status-line">
                        <span class="step ${d.step>=1?'active':''}">Оплата</span>
                        <span class="step ${d.step>=2?'active':''}">Передача</span>
                        <span class="step ${d.step>=3?'active':''}">Финиш</span>
                    </div>
                    <div class="p2p-info">
                        <b>${d.g} Gold</b>
                        <button class="f-btn" onclick="updateStep(${i})">${d.step==1?'Я отправил':'Я получил'}</button>
                    </div>
                </div>`).join('');
        }

        // --- ВСПОМОГАТЕЛЬНОЕ ---
        function nav(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            el.classList.add('active');
        }

        function moveCase(d) {
            curC = (curC + d + CASES.length) % CASES.length;
            document.getElementById('c-name').innerText = CASES[curC].name;
            document.getElementById('c-price').innerText = CASES[curC].price + " VC";
            document.getElementById('c-img').src = CASES[curC].img;
        }

        function openItem(i) {
            sIdx = i; const it = db.inv[i];
            document.getElementById('mi-name').innerText = it.name;
            document.getElementById('mi-name').style.color = `var(--rarity-${it.rarity})`;
            const isEq = (db.eq.title?.id === it.id || db.eq.frame?.id === it.id);
            document.getElementById('mi-btn').innerText = isEq ? "Снять" : "Надеть";
            document.getElementById('mi-btn').onclick = () => {
                if(isEq) db.eq[it.type] = null;
                else db.eq[it.type] = it;
                save(); closeModal();
            };
            openModal('m-item');
        }

        function openModal(id) {
            document.getElementById('modal-bg').style.display = 'flex';
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }

        function launchConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = Array.from({length:100}, () => ({
                x: Math.random()*canvas.width, y: -20,
                s: Math.random()*5+2, d: Math.random()*2-1,
                c: `hsl(${Math.random()*360}, 100%, 50%)`
            }));
            function frame() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => {
                    p.y += p.s; p.x += p.d;
                    ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 5, 5);
                });
                if(particles[0].y < canvas.height) requestAnimationFrame(frame);
            }
            frame();
        }

        moveCase(0); addXp(0);
    </script>
</body>
</html>
