<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOON...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Фиолетово-оранжевый градиент */
            background: linear-gradient(180deg, #30164a 0%, #7e4b68 40%, #d48c48 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Контейнер для компаса и кольца загрузки */
        .loader-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* Анимация крутящегося кольца загрузки */
        .spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 6px solid rgba(255, 255, 255, 0.15);
            border-top: 6px solid #ffffff;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Иконка компаса (эмодзи) с легкой пульсацией */
        .compass {
            font-size: 70px;
            z-index: 2;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        h1 {
            font-size: 42px;
            letter-spacing: 5px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        p.desc {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 25px;
            line-height: 1.4;
            max-width: 300px;
        }

        p.hint {
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 40px;
            max-width: 280px;
        }

        .btn-update {
            background-color: #21C07A;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(33, 192, 122, 0.4); /* Мягкое свечение кнопки */
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-update:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <audio id="bg-audio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="loader-container">
        <div class="spinner"></div>
        <div class="compass">🧭</div>
    </div>

    <h1>SOON...</h1>
    
    <p class="desc">Сейчас доступ временно ограничен. Попробуйте зайти позже.</p>
    
    <p class="hint"> Скоро будет что-то интересное.</p>

    <button class="btn-update" onclick="window.location.reload()">Обновить</button>

    <script>
        // Скрипт: Музыка запускается при первом касании экрана (ограничение браузеров)
        let audioPlayed = false;
        const audio = document.getElementById('bg-audio');

        document.body.addEventListener('click', function() {
            if (!audioPlayed) {
                audio.play();
                audioPlayed = true;
            }
        });
    </script>

</body>
</html>
