<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --text: #ffffff; --sub: rgba(255,255,255,0.6); }
        body { font-family: -apple-system, system-ui, sans-serif; color: var(--text); margin: 0; padding: 16px; background: #000; min-height: 100vh; padding-bottom: 140px; }
        
        /* Рамки аватарок */
        .buy-theme { background: linear-gradient(135deg, #2d0036 0%, #000 100%); --acc: #ff00ff; }
        .sell-theme { background: linear-gradient(135deg, #3d1a00 0%, #000 100%); --acc: #ff9900; }
        .prof-theme { background: #111; --acc: #8e8e93; }

        .card { background: rgba(255,255,255,0.06); border-radius: 24px; padding: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
        input { width: 100%; box-sizing: border-box; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; background: var(--acc); color: white; font-weight: 700; cursor: pointer; }

        /* Увеличенное меню */
        .nav { position: fixed; bottom: 25px; left: 15px; right: 15px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 18px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-btn { background: none; border: none; color: var(--sub); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: 0.3s; }
        .nav-btn span { font-size: 24px; }
        .nav-btn.active { color: white; transform: scale(1.1); }

        .ava-frame { width: 90px; height: 90px; margin: 0 auto 15px; border-radius: 50%; padding: 4px; background: linear-gradient(45deg, #ff00ff, #ff9900); display: flex; align-items: center; justify-content: center; }
        .ava-frame img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }

        .hist-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body class="buy-theme" id="bdy">

    <div id="p-buy" class="card">
        <h2>💎 Купить Gold</h2>
        <input type="number" id="i-buy" placeholder="Кол-во Gold" oninput="calc('buy')">
        <div style="text-align:center; margin:15px 0">
            <div style="font-size:32px; font-weight:800; color:#ff00ff" id="o-buy">0 ₽</div>
            <div style="font-size:12px; color:var(--sub); margin-top:5px">Оплата СБП. Скриншот лота в чат.</div>
        </div>
        <button class="btn" onclick="process('buy')">КУПИТЬ</button>
    </div>

    <div id="p-sell" class="card" style="display:none">
        <h2>💸 Продать Gold</h2>
        <input type="number" id="i-sell" placeholder="Сколько хотите продать" oninput="calc('sell')">
        <input type="text" id="s-bank" placeholder="Карта / Банк">
        <div style="text-align:center; margin:15px 0">
            <div style="font-size:24px; font-weight:800; color:#ff9900" id="o-sell">Вы получите: 0 ₽</div>
            <div style="font-size:14px; color:#00ff88; font-weight:bold; margin-top:8px" id="o-sell-total">Нужно будет купить скин за: 0 G</div>
            <div style="font-size:11px; color:var(--sub); margin-top:4px">(Цена с учетом комиссии 20%)</div>
        </div>
        <button class="btn" onclick="process('sell')">ПРОДАТЬ</button>
    </div>

    <div id="p-prof" style="display:none">
        <div class="card" style="text-align:center">
            <div class="ava-frame" id="a-frame">
                <img id="u-ava" src="https://via.placeholder.com/80">
            </div>
            <h3 id="u-name" style="margin:0">...</h3>
            <p id="u-id" style="color:var(--sub); font-size:12px; margin:5px 0 15px 0"></p>
        </div>
        <div class="card">
            <h4>📜 История операций</h4>
            <div id="history-list"></div>
        </div>
    </div>

    <nav class="nav">
        <button id="t-buy" class="nav-btn active" onclick="setTab('buy')"><span>💎</span>Купить</button>
        <button id="t-sell" class="nav-btn" onclick="setTab('sell')"><span>💸</span>Продать</button>
        <button id="t-prof" class="nav-btn" onclick="setTab('prof')"><span>👤</span>Профиль</button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || {id: 0, first_name: 'User', photo_url: ''};

        if(user.photo_url) document.getElementById('u-ava').src = user.photo_url;
        document.getElementById('u-name').innerText = user.first_name;
        document.getElementById('u-id').innerText = `ID: ${user.id}`;

        function calc(t) {
            const v = parseFloat(document.getElementById('i-'+t).value) || 0;
            if(t==='buy') {
                document.getElementById('o-buy').innerText = Math.round(v * 0.55) + " ₽";
            } else {
                document.getElementById('o-sell').innerText = "Вы получите: " + Math.round(v * 0.45) + " ₽";
                document.getElementById('o-sell-total').innerText = "Выставить скин за: " + Math.round(v * 1.2) + " G";
            }
        }

        async function process(type) {
            const amt = document.getElementById('i-'+type).value;
            if(!amt || amt < 100) return tg.showAlert("Минимум 100 Gold");
            
            let payload = { method: "direct_order", user_id: user.id, amt: amt, type: type };
            if(type === 'sell') payload.bank = document.getElementById('s-bank').value;

            await fetch('https://vo1dminiapp.5487n7z82j.workers.dev', { method: 'POST', body: JSON.stringify(payload) });
            tg.close();
        }

        function setTab(t) {
            ['buy','sell','prof'].forEach(p => {
                document.getElementById('p-'+p).style.display = p===t?'block':'none';
                document.getElementById('t-'+p).classList.toggle('active', p===t);
            });
            document.getElementById('bdy').className = t + '-theme';
            const frame = document.getElementById('a-frame');
            frame.style.background = t === 'buy' ? 'linear-gradient(45deg, #ff00ff, #330033)' : 'linear-gradient(45deg, #ff9900, #331a00)';
            if(t === 'prof') loadData();
        }

        async function loadData() {
            const res = await fetch('https://vo1dminiapp.5487n7z82j.workers.dev', {
                method: 'POST', body: JSON.stringify({ method: "get_user_data", user_id: user.id })
            });
            const data = await res.json();
            document.getElementById('history-list').innerHTML = data.history.map(h => `
                <div class="hist-item">
                    <div><b>${h.amt} G</b><br><small>${h.type==='buy'?'Покупка':'Продажа'}</small></div>
                    <div style="color:${h.status==='Completed'?'#00ff88':'#ffcc00'}">${h.status==='Completed'?'ВЫПОЛНЕНО':'В ПРОЦЕССЕ'}</div>
                </div>
            `).join('') || "Пока пусто";
        }
    </script>
</body>
</html>
