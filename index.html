<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Эта функция — сердце отправки
    function send(type) {
        try {
            const amt = document.getElementById('in-' + type).value;
            
            if (!amt || amt < 100) {
                tg.showAlert("Минимальная сумма — 100 Gold");
                return;
            }

            const data = JSON.stringify({
                type: type,
                amt: amt
            });

            // ВАЖНО: Проверяем, разрешает ли Телеграм отправку
            tg.sendData(data); 
            
            // Если код дошел сюда, значит данные улетели
            tg.close();
        } catch (e) {
            alert("Ошибка отправки: " + e.message);
        }
    }
    
    // Функция для вкладок
    function tab(t) {
        ['buy','sell','prof'].forEach(p => document.getElementById('page-'+p).style.display = p===t?'block':'none');
        ['buy','sell','prof'].forEach(p => document.getElementById('tab-'+p).classList.toggle('active', p===t));
        document.getElementById('bdy').className = t + '-page';
    }
</script>
