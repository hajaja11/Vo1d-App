<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLITZ HUB: LESTA EDITION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05070a;
            --panel-hex: #12161f;
            --accent: #ff7b00; /* Оранжевый Лесты */
            --safe-green: #22c55e;
            --danger-red: #ef4444;
            --rarity-x: #eab308; /* Золото для 10 ур */
            --rarity-8: #a855f7; /* Фиолет для 8 ур */
            --text-silver: #c0c0c0;
        }

        /* Общие стили */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-deep); color: #fff; 
            font-family: 'Exo 2', sans-serif; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Анимации */
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 20px var(--accent); } 100% { box-shadow: 0 0 5px var(--accent); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        /* Шапка */
        header {
            background: var(--panel-hex); padding: 20px;
            border-bottom: 2px solid #1e2533; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .logo-area h1 { font-family: 'Orbitron'; font-size: 18px; letter-spacing: 2px; color: var(--accent); }
        .currency-cluster { display: flex; gap: 15px; }
        .val-box { display: flex; align-items: center; gap: 5px; font-weight: 800; font-family: 'Orbitron'; font-size: 14px; }
        .val-box span { color: var(--accent); }

        /* Навигация */
        nav {
            background: var(--panel-hex); height: 75px;
            display: flex; border-top: 1px solid #1e2533;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-link {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #4b5563; transition: 0.3s; text-decoration: none;
        }
        .nav-link.active { color: var(--accent); background: rgba(255,123,0,0.05); }
        .nav-link svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        .nav-link span { font-size: 10px; font-weight: 800; text-transform: uppercase; }

        /* Контент */
        .viewport { flex: 1; overflow-y: auto; padding: 20px; }
        .section { display: none; animation: slideIn 0.3s ease-out; }
        .section.active { display: block; }

        /* Карточки */
        .glass-card {
            background: rgba(18, 22, 31, 0.8); border: 1px solid #1e2533;
            border-radius: 16px; padding: 20px; margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #1e2533; }
        .stat-label { color: var(--text-silver); font-size: 12px; }
        .stat-value { font-weight: 800; color: #fff; }

        /* Поиск */
        .search-grp { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-grp input {
            flex: 1; background: #000; border: 1px solid #1e2533;
            border-radius: 10px; padding: 12px; color: #fff; font-size: 16px; outline: none;
        }
        .btn-action {
            background: var(--accent); border: none; border-radius: 10px;
            padding: 12px 20px; color: #000; font-weight: 900;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .btn-action:active { transform: scale(0.95); }

        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .tank-card {
            background: #000; border-radius: 12px; padding: 15px;
            border-top: 4px solid var(--text-silver); position: relative;
            overflow: hidden;
        }
        .tank-card.rarity-10 { border-top-color: var(--rarity-x); box-shadow: 0 0 15px rgba(234,179,8,0.2); }
        .tank-card.rarity-8 { border-top-color: var(--rarity-8); }
        .tank-name { font-weight: 800; font-size: 14px; margin-bottom: 5px; }
        .tank-level { font-family: 'Orbitron'; font-size: 10px; color: var(--accent); }

        /* Взвод (P2P) */
        .p2p-request {
            background: var(--panel-hex); border-left: 4px solid var(--accent);
            padding: 15px; border-radius: 10px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .p2p-info h4 { font-size: 16px; margin-bottom: 4px; }
        .p2p-meta { font-size: 11px; color: var(--text-silver); }
        .p2p-badge { background: #1e2533; padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }

        /* Модалка */
        #modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); z-index: 1000; display: none;
            padding: 40px 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1 id="header-title">BLITZ OPS</h1>
    </div>
    <div class="currency-cluster">
        <div class="val-box"><span id="user-vc">2500</span>&nbsp;VC</div>
    </div>
</header>

<div class="viewport">
    
    <div id="view-hangar" class="section active">
        <div class="glass-card">
            <h3 style="margin-bottom: 15px; font-family: 'Orbitron';">СИНХРОНИЗАЦИЯ LESTA</h3>
            <div class="search-grp">
                <input type="text" id="lesta-nick" placeholder="Ваш ник в игре...">
                <button class="btn-action" onclick="syncLesta()">SCAN</button>
            </div>
            <div id="player-stats-box" style="display: none;">
                <div class="stat-row"><span class="stat-label">ПОБЕДЫ</span><span class="stat-value" id="res-wr" style="color: var(--safe-green);">--</span></div>
                <div class="stat-row"><span class="stat-label">СРЕДНИЙ УРОН</span><span class="stat-value" id="res-dmg">--</span></div>
                <div class="stat-row"><span class="stat-label">БОЕВ</span><span class="stat-value" id="res-battles">--</span></div>
            </div>
        </div>

        <h3 style="margin-bottom: 15px; font-family: 'Orbitron'; color: var(--text-silver);">МОЙ АНГАР</h3>
        <div class="inv-grid" id="inventory-list">
            </div>
    </div>

    <div id="view-market" class="section">
        <div class="glass-card" style="text-align: center; border: 2px solid var(--accent); animation: glow 3s infinite;">
            <div style="font-size: 64px; margin-bottom: 10px;">🛡️</div>
            <h2 style="font-family: 'Orbitron'; color: var(--accent);">КОНТЕЙНЕР "LESTA"</h2>
            <p style="font-size: 12px; color: var(--text-silver); margin: 10px 0 20px;">Шанс на Объект 260 или AMX M4 54</p>
            <button class="btn-action" style="width: 100%;" onclick="gambleCase()">ОТКРЫТЬ (500 VC)</button>
        </div>
    </div>

    <div id="view-platoon" class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="font-family: 'Orbitron';">ПОИСК ВЗВОДА</h3>
            <button class="btn-action" style="padding: 8px 15px; font-size: 12px;" onclick="toggleModal(true)">СОЗДАТЬ</button>
        </div>
        <div id="platoon-feed">
            </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="glass-card">
        <h3 style="margin-bottom: 20px;">НОВАЯ ЗАЯВКА</h3>
        <input type="text" id="pl-input-nick" class="search-grp" style="width:100%; margin-bottom:15px; padding:12px;" placeholder="Ваш ник...">
        <input type="text" id="pl-input-wr" class="search-grp" style="width:100%; margin-bottom:15px; padding:12px;" placeholder="Процент побед (напр. 55%)...">
        <input type="text" id="pl-input-lvl" class="search-grp" style="width:100%; margin-bottom:15px; padding:12px;" placeholder="Уровень (8, 10)...">
        <button class="btn-action" style="width: 100%;" onclick="publishPlatoon()">ОПУБЛИКОВАТЬ</button>
        <button class="btn-action" style="width: 100%; background: none; color: #fff; margin-top: 10px;" onclick="toggleModal(false)">ОТМЕНА</button>
    </div>
</div>

<nav>
    <a href="#" class="nav-link active" onclick="showPage('view-hangar', this)">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Ангар</span>
    </a>
    <a href="#" class="nav-link" onclick="showPage('view-market', this)">
        <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
        <span>Рынок</span>
    </a>
    <a href="#" class="nav-link" onclick="showPage('view-platoon', this)">
        <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <span>Взвод</span>
    </a>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // --- БАЗА ДАННЫХ (LOCALSTORAGE) ---
    let db = JSON.parse(localStorage.getItem('blitz_db')) || {
        vc: 2500,
        inventory: [],
        platoons: [
            { nick: 'Varyag_RU', wr: '62%', lvl: '10', time: '5м назад' },
            { nick: 'Tankist_777', wr: '48%', lvl: '8', time: '12м назад' }
        ]
    };

    function save() {
        localStorage.setItem('blitz_db', JSON.stringify(db));
        updateHeader();
    }

    function updateHeader() {
        document.getElementById('user-vc').innerText = db.vc;
    }

    // --- НАВИГАЦИЯ ---
    function showPage(pageId, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    // --- LESTA API СИНХРОНИЗАЦИЯ ---
    const APP_ID = 'e7428f7bece3bb697c11f7c75db4ce50'; // Твой ключ Lesta

    async function syncLesta() {
        const nick = document.getElementById('lesta-nick').value.trim();
        if(!nick) return;

        tg.MainButton.showProgress();
        try {
            // Поиск по RU региону (Lesta)
            const searchRes = await fetch(`https://api.wotblitz.ru/wotb/account/list/?application_id=${APP_ID}&search=${nick}`);
            const searchData = await searchRes.json();

            if(searchData.status === 'ok' && searchData.data.length > 0) {
                const accId = searchData.data[0].account_id;
                const infoRes = await fetch(`https://api.wotblitz.ru/wotb/account/info/?application_id=${APP_ID}&account_id=${accId}`);
                const infoData = await infoRes.json();
                const stats = infoData.data[accId].statistics.all;

                document.getElementById('player-stats-box').style.display = 'block';
                document.getElementById('res-wr').innerText = ((stats.wins / stats.battles)*100).toFixed(2) + '%';
                document.getElementById('res-dmg').innerText = Math.round(stats.damage_dealt / stats.battles);
                document.getElementById('res-battles').innerText = stats.battles.toLocaleString();
                
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showAlert("Игрок не найден в базе Lesta!");
            }
        } catch(e) {
            tg.showAlert("Ошибка подключения к API");
        } finally {
            tg.MainButton.hideProgress();
        }
    }

    // --- РЫНОК И КЕЙСЫ ---
    const loot = [
        { name: 'Объект 260', lvl: 'X', rarity: 10, chance: 5 },
        { name: 'AMX M4 54', lvl: 'X', rarity: 10, chance: 10 },
        { name: 'Progetto 46', lvl: 'VIII', rarity: 8, chance: 25 },
        { name: 'Bourrasque', lvl: 'VIII', rarity: 8, chance: 30 },
        { name: 'Бустеры золота', lvl: 'ITEM', rarity: 0, chance: 30 }
    ];

    function gambleCase() {
        if(db.vc < 500) return tg.showAlert("Недостаточно VC ресурсов!");
        
        db.vc -= 500;
        tg.HapticFeedback.impactOccurred('medium');

        const roll = Math.random() * 100;
        let pool = 0;
        let win = loot[loot.length-1];

        for(let item of loot) {
            pool += item.chance;
            if(roll <= pool) {
                win = item;
                break;
            }
        }

        if(win.rarity > 0) {
            db.inventory.unshift(win);
            tg.showAlert(`🔥 ТРОФЕЙ: ${win.name} (${win.lvl})`);
        } else {
            tg.showAlert(`Обычный дроп: ${win.name}`);
        }
        
        save();
        renderInventory();
    }

    function renderInventory() {
        const list = document.getElementById('inventory-list');
        if(db.inventory.length === 0) {
            list.innerHTML = `<p style="grid-column: span 2; color: #4b5563; text-align: center;">Ангар пуст. Откройте контейнеры на рынке.</p>`;
            return;
        }
        list.innerHTML = db.inventory.map(t => `
            <div class="tank-card rarity-${t.rarity}">
                <div class="tank-level">${t.lvl} LEVEL</div>
                <div class="tank-name">${t.name}</div>
            </div>
        `).join('');
    }

    // --- ВЗВОД (P2P) ---
    function toggleModal(show) {
        document.getElementById('modal-overlay').style.display = show ? 'block' : 'none';
    }

    function publishPlatoon() {
        const nick = document.getElementById('pl-input-nick').value;
        const wr = document.getElementById('pl-input-wr').value;
        const lvl = document.getElementById('pl-input-lvl').value;

        if(!nick || !wr) return tg.showAlert("Заполните данные!");

        db.platoons.unshift({ nick, wr, lvl, time: 'Только что' });
        save();
        renderPlatoons();
        toggleModal(false);
        tg.HapticFeedback.notificationOccurred('success');
    }

    function renderPlatoons() {
        const feed = document.getElementById('platoon-feed');
        feed.innerHTML = db.platoons.map(p => `
            <div class="p2p-request">
                <div class="p2p-info">
                    <h4>${p.nick}</h4>
                    <div class="p2p-meta">Статистика: <span style="color: var(--accent)">${p.wr}</span> • Уровни: ${p.lvl}</div>
                </div>
                <div style="text-align: right;">
                    <div class="p2p-badge">${p.time}</div>
                    <button class="btn-action" style="padding: 5px 10px; font-size: 10px; margin-top: 5px;" onclick="tg.showAlert('Запрос отправлен игроку!')">ВСТУПИТЬ</button>
                </div>
            </div>
        `).join('');
    }

    // Инициализация
    updateHeader();
    renderInventory();
    renderPlatoons();
</script>
</body>
</html>
