<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VO1D STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-grad: linear-gradient(180deg, #30164a 0%, #7e4b68 40%, #d48c48 100%);
            --accent: #ff9d00; --btn-green: #21C07A; --tab-bg: rgba(20, 10, 30, 0.95); --card-bg: rgba(255, 255, 255, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-grad); height: 100vh; color: white; font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Навигация */
        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: var(--tab-bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.5); font-size: 11px; transition: 0.2s; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }

        /* Общие элементы */
        .section-title { text-align: center; margin: 10px 0 20px; font-weight: bold; letter-spacing: 1px; }
        .btn { width: 100%; border: none; padding: 15px; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--btn-green); }
        .btn-outline { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }

        /* Кейсы */
        .carousel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 15px; }
        .carousel-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0 10px; }
        #case-title { font-size: 18px; font-weight: bold; text-align: center; flex: 1; text-shadow: 0 0 10px var(--accent); }
        .case-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; height: 280px; justify-content: center; }
        .case-image { width: 140px; height: 140px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); transition: 0.3s; object-fit: contain;}
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .case-price { font-size: 32px; font-weight: bold; margin-bottom: 20px; }

        /* Рулетка */
        .roulette-container { display: none; width: 100%; height: 100px; background: rgba(0,0,0,0.5); border-radius: 15px; border: 2px solid var(--accent); position: relative; overflow: hidden; margin-top: 50px; }
        .roulette-track { display: flex; height: 100%; align-items: center; transition: transform 4s cubic-bezier(0.15, 0.9, 0.15, 1); }
        .roulette-item { min-width: 80px; height: 80px; margin: 0 5px; background: var(--card-bg); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid; font-size: 30px; }
        .roulette-item span { font-size: 9px; margin-top: 5px; font-weight: bold; text-align: center; width: 100%; }
        .roulette-pointer { position: absolute; top: 0; left: 50%; width: 4px; height: 100%; background: #ff0055; transform: translateX(-50%); z-index: 10; }

        /* Модалки */
        .win-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .win-content { background: var(--bg-grad); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid; width: 85%; }
        .duplicate-text { font-size: 12px; color: #FFD700; margin-top: 10px; font-weight: bold; }

        /* Профиль */
        .user-card { background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px; }
        .avatar-lg { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); margin: 0 auto 5px; background-position: center; background-size: cover; }
        .balance-block { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: center; }
        .balance-val { font-size: 32px; font-weight: bold; margin: 5px 0 15px; }
        .balance-actions { display: flex; gap: 10px; }
        .withdraw-section { display: none; background: var(--card-bg); border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid rgba(255,157,0,0.3); }
        .calc-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; color: white; margin: 10px 0; outline: none; text-align: center; }
        
        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .inv-slot { aspect-ratio: 1; background: var(--card-bg); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid; position: relative;}

        /* Секретная Админка */
        #admin-panel { display: none; background: #222; border: 2px solid #ff0000; border-radius: 15px; padding: 15px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="win-modal" class="win-modal">
        <div class="win-content" id="win-content-box">
            <h2 id="win-title-text" style="color: var(--accent);">ВЫБИТ ПРЕДМЕТ!</h2>
            <div class="win-item-icon" id="win-icon" style="font-size: 80px; margin: 15px 0;">👑</div>
            <h3 id="win-name">Предмет</h3>
            <div id="win-duplicate" class="duplicate-text"></div>
            <button class="btn btn-primary" style="margin-top: 20px;" onclick="closeWinModal()">Забрать</button>
        </div>
    </div>

    <div class="content">
        <div id="cases" class="page active">
            <div class="carousel-header">
                <button class="carousel-btn" onclick="changeCase(-1)">◄</button>
                <div id="case-title">Кейс</div>
                <button class="carousel-btn" onclick="changeCase(1)">►</button>
            </div>
            <div class="case-wrapper">
                <div id="case-display"><img class="case-image" id="case-icon" src=""><div class="case-price" id="case-price">0 VC</div></div>
                <div id="roulette" class="roulette-container"><div class="roulette-pointer"></div><div class="roulette-track" id="r-track"></div></div>
            </div>
            <button class="btn btn-primary" id="btn-open" onclick="openCase()">ОТКРЫТЬ КЕЙС</button>
        </div>

        <div id="p2p" class="page">
            <h2 class="section-title">P2P РЫНОК</h2>
            <p style="text-align: center; opacity: 0.5;">Рынок в разработке...</p>
        </div>

        <div id="inventory" class="page">
            <h2 class="section-title">ИНВЕНТАРЬ</h2>
            <div class="inv-grid"></div>
        </div>

        <div id="profile" class="page">
            <h2 class="section-title">ПРОФИЛЬ</h2>
            <div class="user-card">
                <div style="position: relative; display: inline-block;">
                    <div class="avatar-lg" id="profile-avatar"></div>
                    <div id="vip-badge" style="display: none; position: absolute; top: -10px; right: -10px; font-size: 24px;">👑</div>
                </div>
                <h3 id="player-name">Player</h3>
                <p id="profile-id" style="color: rgba(255,255,255,0.4); font-size: 11px;" onclick="clickAdmin()">ID: 000000</p>
                <p id="profile-title" style="color: var(--accent); font-size: 12px; font-weight: bold; margin-top: 5px;">[ Новичок ]</p>
                
                <div id="admin-panel">
                    <h4 style="color: #ff0000; margin-bottom: 10px;">ADMIN TOOLS</h4>
                    <input type="number" id="adm-vc" class="calc-input" placeholder="Новый баланс">
                    <button class="btn btn-outline" style="padding: 5px; margin-bottom: 5px;" onclick="setAdmBalance()">Установить VC</button>
                    <button class="btn btn-outline" style="padding: 5px; background: #400;" onclick="resetAdmData()">Сбросить всё (Wipe)</button>
                </div>
            </div>

            <div class="balance-block">
                <div style="opacity: 0.6; font-size: 12px;">Баланс Vo1dCoins</div>
                <div class="balance-val" id="vc-display">0 VC</div>
                <div class="balance-actions">
                    <button class="btn btn-primary" onclick="showDeposit()">Пополнить</button>
                    <button class="btn btn-outline" onclick="toggleWd()">Вывести</button>
                </div>
            </div>
            
            <div id="withdraw-modal" class="withdraw-section">
                <input type="number" id="wd-amount" class="calc-input" placeholder="Сумма (мин. 500)" oninput="calcWd()">
                <div style="text-align: center; margin: 10px 0;">Вы получите: <b id="wd-res" style="color: #FFD700;">0</b> G</div>
                <button class="btn btn-primary" onclick="processWithdraw()">ЗАПРОСИТЬ ВЫВОД</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="nav('cases', this)"><svg viewBox="0 0 24 24"><path d="M20,8L12,13L4,8V6L12,11L20,6M20,4H4C2.89,4 2,4.89 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V6A2,2 0 0,0 20,4Z"/></svg><span>Кейсы</span></div>
        <div class="nav-item" onclick="nav('p2p', this)"><svg viewBox="0 0 24 24"><path d="M12,3L1,9L12,15L21,10.09V17H23V9M5,13.18V17.18L12,21L19,17.18V13.18L12,17L5,13.18Z"/></svg><span>P2P</span></div>
        <div class="nav-item" onclick="nav('inventory', this)"><svg viewBox="0 0 24 24"><path d="M12,2L4,5V11.09C4,16.14 7.41,20.85 12,22C16.59,20.85 20,16.14 20,11.09V5L12,2Z"/></svg><span>Склад</span></div>
        <div class="nav-item" onclick="nav('profile', this)"><svg viewBox="0 0 24 24"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg><span>Профиль</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const tUser = tg.initDataUnsafe?.user;
        const playerName = tUser?.first_name || "Player";
        const playerAvatar = tUser?.photo_url || "";
        const playerId = tUser?.id || "000000";

        // === ПАМЯТЬ ===
        const defaultData = { balance_vc: 1500, inventory: [], equipped: { frame: null, title: null }, isVIP: false };
        let userData = JSON.parse(localStorage.getItem('voidStoreData')) || defaultData;

        function saveData() { localStorage.setItem('voidStoreData', JSON.stringify(userData)); }

        // === РЕДКОСТЬ ===
        function getRarityColor(chance) {
            if (chance >= 40) return "#9e9e9e";
            if (chance >= 20) return "#2196f3";
            if (chance >= 5) return "#9c27b0";
            if (chance > 1) return "#f44336";
            return "#FFD700";
        }

        const autoPaint = (drops) => drops.map(d => { d.color = getRarityColor(d.chance); return d; });

        // === КЕЙСЫ ===
        const casesData = [
            { id: 'economy', name: "Осколок Пустоты", price: 50, color: "#aaa", image: "https://cdn3d.iconscout.com/3d/premium/thumb/box-4996160-4159676.png", drops: autoPaint([
                { id: "vc_20", type: "currency", icon: "🪙", name: "20 VC", value: 20, chance: 40 },
                { id: "t_dust", type: "title", icon: "💨", name: "Пыль", chance: 30 },
                { id: "f_rusty", type: "frame", icon: "🧱", name: "Ржавая Рамка", chance: 20 },
                { id: "vc_50", type: "currency", icon: "🪙", name: "50 VC", value: 50, chance: 9 },
                { id: "fee_5", type: "consumable", icon: "🏷️", name: "-5% Комиссии", chance: 1 }
            ])},
            { id: 'medium', name: "Неоновый Бокс", price: 150, color: "#8A2BE2", image: "https://cdn3d.iconscout.com/3d/premium/thumb/sci-fi-box-5374092-4493399.png", drops: autoPaint([
                { id: "vc_70", type: "currency", icon: "🪙", name: "70 VC", value: 70, chance: 40 },
                { id: "f_neon", type: "frame", icon: "🔮", name: "Неон Рамка", chance: 25 },
                { id: "t_hacker", type: "title", icon: "💻", name: "Хакер", chance: 20 },
                { id: "vc_150", type: "currency", icon: "🪙", name: "150 VC", value: 150, chance: 10 },
                { id: "vc_500", type: "currency", icon: "💰", name: "500 VC", value: 500, chance: 5 }
            ])},
            { id: 'elite', name: "Сфера VO1D", price: 500, color: "#FF8C00", image: "https://cdn3d.iconscout.com/3d/premium/thumb/glowing-sphere-8616578-6825700.png", drops: autoPaint([
                { id: "vc_250", type: "currency", icon: "🪙", name: "250 VC", value: 250, chance: 40 },
                { id: "t_baron", type: "title", icon: "🎖", name: "Барон Пустоты", chance: 25 },
                { id: "f_void", type: "frame", icon: "🌀", name: "Аним Рамка", chance: 20 },
                { id: "vip_3d", type: "consumable", icon: "👑", name: "VIP 3 Дня", chance: 14 },
                { id: "vc_5000", type: "currency", icon: "💎", name: "5000 VC", value: 5000, chance: 1 }
            ])},
            { id: 'mythic', name: "Ящик Богов", price: 1000, color: "#FF00FF", image: "https://cdn3d.iconscout.com/3d/premium/thumb/treasure-box-6819970-5603709.png", drops: autoPaint([
                { id: "vc_500", type: "currency", icon: "🪙", name: "500 VC", value: 500, chance: 40 },
                { id: "t_emperor", type: "title", icon: "👑", name: "Император", chance: 30 },
                { id: "f_space", type: "frame", icon: "🌌", name: "Космос Рамка", chance: 20 },
                { id: "vip_30d", type: "consumable", icon: "🌟", name: "VIP 30 Дней", chance: 9.5 },
                { id: "vc_10000", type: "currency", icon: "🤑", name: "10000 VC", value: 10000, chance: 0.5 }
            ])}
        ];

        // === ЛОГИКА ===
        let currentIdx = 0, isSpinning = false, adminClicks = 0;

        function nav(id, el) {
            if(isSpinning) return;
            document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateCaseView() {
            const c = casesData[currentIdx];
            document.getElementById('case-title').innerText = c.name;
            document.getElementById('case-title').style.color = c.color;
            document.getElementById('case-price').innerText = `${c.price} VC`;
            document.getElementById('case-icon').src = c.image;
        }

        function changeCase(dir) {
            if(isSpinning) return;
            currentIdx = (currentIdx + dir + casesData.length) % casesData.length;
            updateCaseView();
        }

        function openCase() {
            const cur = casesData[currentIdx];
            if(isSpinning || userData.balance_vc < cur.price) return tg.showAlert('Недостаточно VC!');
            
            isSpinning = true;
            userData.balance_vc -= cur.price;
            saveData(); refreshAllViews();
            
            document.getElementById('case-display').style.display = 'none';
            document.getElementById('roulette').style.display = 'block';
            
            const track = document.getElementById('r-track');
            track.style.transition = 'none'; track.style.transform = 'translateX(0)'; track.innerHTML = '';
            
            const win = ((c) => {
                let r = Math.random()*100, s = 0;
                for(let d of c.drops) { s+=d.chance; if(r<=s) return d; }
                return c.drops[0];
            })(cur);

            for(let i=0; i<60; i++) {
                const item = i===55 ? win : cur.drops[Math.floor(Math.random()*cur.drops.length)];
                track.innerHTML += `<div class="roulette-item" style="border-color:${item.color}">${item.icon}<span style="color:${item.color}">${item.name}</span></div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.15, 0.9, 0.15, 1)';
                track.style.transform = `translateX(-${(55*90) - (document.getElementById('roulette').offsetWidth/2) + 45}px)`;
            }, 50);

            setTimeout(() => {
                const dup = (win.type==='title'||win.type==='frame') && (userData.inventory.some(i=>i.id===win.id)||userData.equipped[win.type]?.id===win.id);
                document.getElementById('win-icon').innerText = win.icon;
                document.getElementById('win-name').innerText = win.name;
                document.getElementById('win-name').style.color = win.color;
                document.getElementById('win-duplicate').innerText = dup ? `ПОВТОРКА! +${Math.floor(cur.price*0.4)} VC` : "";
                
                if(win.type==='currency') userData.balance_vc += win.value;
                else if(dup) userData.balance_vc += Math.floor(cur.price*0.4);
                else userData.inventory.push(win);

                saveData(); refreshAllViews();
                document.getElementById('win-modal').style.display = 'flex';
                tg.HapticFeedback.notificationOccurred('success');
            }, 4100);
        }

        function closeWinModal() {
            document.getElementById('win-modal').style.display = 'none';
            document.getElementById('case-display').style.display = 'flex';
            document.getElementById('roulette').style.display = 'none';
            isSpinning = false;
        }

        // === АДМИН ПАНЕЛЬ ===
        function clickAdmin() {
            adminClicks++;
            if(adminClicks >= 5) {
                document.getElementById('admin-panel').style.display = 'block';
                tg.showAlert("Режим разработчика активирован!");
                adminClicks = 0;
            }
        }
        function setAdmBalance() {
            const val = parseInt(document.getElementById('adm-vc').value);
            if(!isNaN(val)) { userData.balance_vc = val; saveData(); refreshAllViews(); }
        }
        function resetAdmData() {
            if(confirm("Полный сброс всех данных?")) { userData = defaultData; saveData(); location.reload(); }
        }

        // === ИНТЕРФЕЙС ===
        function refreshAllViews() {
            document.getElementById('vc-display').innerText = `${userData.balance_vc} VC`;
            document.getElementById('player-name').innerText = playerName;
            document.getElementById('profile-id').innerText = `ID: ${playerId}`;
            const av = document.getElementById('profile-avatar');
            if(playerAvatar) av.style.backgroundImage = `url('${playerAvatar}')`;
            
            const tit = userData.equipped.title;
            document.getElementById('profile-title').innerText = tit ? `[ ${tit.name} ]` : "[ Новичок ]";
            document.getElementById('profile-title').style.color = tit ? tit.color : "var(--accent)";
            
            const fr = userData.equipped.frame;
            av.style.borderColor = fr ? fr.color : "var(--accent)";
            av.style.boxShadow = fr ? `0 0 15px ${fr.color}` : "none";
            document.getElementById('vip-badge').style.display = userData.isVIP ? 'block' : 'none';

            const grid = document.querySelector('.inv-grid');
            grid.innerHTML = '';
            userData.inventory.forEach((it, idx) => {
                const eq = userData.equipped[it.type]?.id === it.id;
                grid.innerHTML += `<div class="inv-slot" style="border-color:${eq?'#21C07A':it.color}" onclick="useItem(${idx})">
                    <div style="font-size:30px">${it.icon}</div>
                    <div style="font-size:9px; color:${it.color}">${it.name}</div>
                    ${eq?'<div style="font-size:8px; color:#21C07A">USE</div>':''}
                </div>`;
            });
        }

        function useItem(idx) {
            const it = userData.inventory[idx];
            if(it.type === 'consumable') {
                if(it.id.includes('vip')) userData.isVIP = true;
                userData.inventory.splice(idx,1);
            } else {
                userData.equipped[it.type] = it;
            }
            saveData(); refreshAllViews();
        }

        function showDeposit() {
            tg.showPopup({ title: 'Пополнение', message: 'Для покупки VC перейдите к менеджеру.', buttons: [{id:'ok', type:'default', text:'Перейти'}, {type:'cancel'}] }, (b)=>{
                if(b==='ok') tg.openTelegramLink('https://t.me/vo1dmenegere2_bot');
            });
        }

        function toggleWd() { const s = document.getElementById('withdraw-modal').style; s.display = s.display === 'block' ? 'none' : 'block'; }
        function calcWd() { const v = document.getElementById('wd-amount').value; document.getElementById('wd-res').innerText = v >= 0 ? Math.floor(v/0.55) : 0; }
        
        function processWithdraw() {
            const val = parseInt(document.getElementById('wd-amount').value);
            if(val < 500 || val > userData.balance_vc) return tg.showAlert("Ошибка суммы!");
            tg.showConfirm(`Вывести ${val} VC?`, (ok) => {
                if(ok) tg.openTelegramLink('https://t.me/vo1dmenegere2_bot');
            });
        }

        updateCaseView();
        refreshAllViews();
    </script>
</body>
</html>
