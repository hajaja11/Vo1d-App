<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAINTENANCE | BLITZ LEGACY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Exo+2:wght@200;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff7b00;
            --bg: #05070a;
            --metal: #1a1e26;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Фоновый ангар с блюром */
        .hangar-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.wallpapersden.com/image/download/world-of-tanks-blitz-game_a2tqZ2aUmZqaraWkpJRmbmdlrWZlbWU.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(8px) brightness(0.3);
            z-index: -1;
            transform: scale(1.1);
        }

        /* Сетка поверх для тех-стиля */
        .overlay-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 123, 0, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            width: 100%;
        }

        /* --- СИСТЕМА ШЕСТЕРЕНОК --- */
        .gears-assembly {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
        }

        .gear {
            position: absolute;
            fill: var(--accent);
            filter: drop-shadow(0 0 10px rgba(255, 123, 0, 0.3));
        }

        .gear-main {
            width: 120px;
            height: 120px;
            top: 40px; left: 40px;
            animation: rotate-right 8s linear infinite;
        }

        .gear-small {
            width: 70px;
            height: 70px;
            top: 20px; left: 115px;
            animation: rotate-left 5s linear infinite;
            fill: #4b5563;
        }

        .gear-bottom {
            width: 85px;
            height: 85px;
            top: 105px; left: 15px;
            animation: rotate-left 6s linear infinite;
            fill: #374151;
        }

        @keyframes rotate-right { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-left { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* --- ТЕКСТ И ИНДИКАТОРЫ --- */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255, 123, 0, 0.5);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .status-msg {
            font-size: 14px;
            font-weight: 200;
            color: #9ca3af;
            margin-bottom: 30px;
            height: 20px;
        }

        /* Прогресс-бар */
        .progress-container {
            width: 250px;
            height: 4px;
            background: rgba(255,255,255,0.05);
            margin: 0 auto 40px;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: load 4s ease-in-out infinite;
        }

        @keyframes load {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        /* Кнопка выхода */
        .btn-exit {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 900;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-exit:active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent);
        }

        /* Декор «Искры» */
        .sparks {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="hangar-bg"></div>
    <div class="overlay-grid"></div>

    <div class="container">
        <div class="gears-assembly">
            <svg class="gear gear-bottom" viewBox="0 0 100 100">
                <path d="M50 35c-8.3 0-15 6.7-15 15s6.7 15 15 15 15-6.7 15-15-6.7-15-15-15zm45 15.3l-10.7-1.8c-.4-1.9-.9-3.7-1.7-5.4l7.6-7.7c.6-.6.6-1.5 0-2.1l-6.4-6.4c-.6-.6-1.5-.6-2.1 0l-7.7 7.6c-1.7-.8-3.5-1.4-5.4-1.7l-1.8-10.7c-.1-.8-.8-1.4-1.6-1.4h-9c-.8 0-1.5.6-1.6 1.4l-1.8 10.7c-1.9.4-3.7.9-5.4 1.7l-7.7-7.6c-.6-.6-1.5-.6-2.1 0l-6.4 6.4c-.6.6-.6 1.5 0 2.1l7.6 7.7c-.8 1.7-1.4 3.5-1.7 5.4l-10.7 1.8c-.8.1-1.4.8-1.4 1.6v9c0 .8.6 1.5 1.4 1.6l10.7 1.8c.4 1.9.9 3.7 1.7 5.4l-7.6 7.7c-.6.6-.6 1.5 0 2.1l6.4 6.4c.6.6 1.5.6 2.1 0l7.7-7.6c1.7.8 3.5 1.4 5.4 1.7l1.8 10.7c.1.8.8 1.4 1.6 1.4h9c.8 0 1.5-.6 1.6-1.4l1.8-10.7c1.9-.4 3.7-.9 5.4-1.7l7.7 7.6c.6.6 1.5.6 2.1 0l6.4-6.4c.6-.6.6-1.5 0-2.1l-7.6-7.7c.8-1.7 1.4-3.5 1.7-5.4l10.7-1.8c.8-.1 1.4-.8 1.4-1.6v-9c0-.8-.6-1.5-1.4-1.6z"/>
            </svg>
            <svg class="gear gear-small" viewBox="0 0 100 100">
                <path d="M50 35c-8.3 0-15 6.7-15 15s6.7 15 15 15 15-6.7 15-15-6.7-15-15-15zm45 15.3l-10.7-1.8c-.4-1.9-.9-3.7-1.7-5.4l7.6-7.7c.6-.6.6-1.5 0-2.1l-6.4-6.4c-.6-.6-1.5-.6-2.1 0l-7.7 7.6c-1.7-.8-3.5-1.4-5.4-1.7l-1.8-10.7c-.1-.8-.8-1.4-1.6-1.4h-9c-.8 0-1.5.6-1.6 1.4l-1.8 10.7c-1.9.4-3.7.9-5.4 1.7l-7.7-7.6c-.6-.6-1.5-.6-2.1 0l-6.4 6.4c-.6.6-.6 1.5 0 2.1l7.6 7.7c-.8 1.7-1.4 3.5-1.7 5.4l-10.7 1.8c-.8.1-1.4.8-1.4 1.6v9c0 .8.6 1.5 1.4 1.6l10.7 1.8c.4 1.9.9 3.7 1.7 5.4l-7.6 7.7c-.6.6-.6 1.5 0 2.1l6.4 6.4c.6.6 1.5.6 2.1 0l7.7-7.6c1.7.8 3.5 1.4 5.4 1.7l1.8 10.7c.1.8.8 1.4 1.6 1.4h9c.8 0 1.5-.6 1.6-1.4l1.8-10.7c1.9-.4 3.7-.9 5.4-1.7l7.7 7.6c.6.6 1.5.6 2.1 0l6.4-6.4c.6-.6.6-1.5 0-2.1l-7.6-7.7c.8-1.7 1.4-3.5 1.7-5.4l10.7-1.8c.8-.1 1.4-.8 1.4-1.6v-9c0-.8-.6-1.5-1.4-1.6z"/>
            </svg>
            <svg class="gear gear-main" viewBox="0 0 100 100">
                <path d="M50 35c-8.3 0-15 6.7-15 15s6.7 15 15 15 15-6.7 15-15-6.7-15-15-15zm45 15.3l-10.7-1.8c-.4-1.9-.9-3.7-1.7-5.4l7.6-7.7c.6-.6.6-1.5 0-2.1l-6.4-6.4c-.6-.6-1.5-.6-2.1 0l-7.7 7.6c-1.7-.8-3.5-1.4-5.4-1.7l-1.8-10.7c-.1-.8-.8-1.4-1.6-1.4h-9c-.8 0-1.5.6-1.6 1.4l-1.8 10.7c-1.9.4-3.7.9-5.4 1.7l-7.7-7.6c-.6-.6-1.5-.6-2.1 0l-6.4 6.4c-.6.6-.6 1.5 0 2.1l7.6 7.7c-.8 1.7-1.4 3.5-1.7 5.4l-10.7 1.8c-.8.1-1.4.8-1.4 1.6v9c0 .8.6 1.5 1.4 1.6l10.7 1.8c.4 1.9.9 3.7 1.7 5.4l-7.6 7.7c-.6.6-.6 1.5 0 2.1l6.4 6.4c.6.6 1.5.6 2.1 0l7.7-7.6c1.7.8 3.5 1.4 5.4 1.7l1.8 10.7c.1.8.8 1.4 1.6 1.4h9c.8 0 1.5-.6 1.6-1.4l1.8-10.7c1.9-.4 3.7-.9 5.4-1.7l7.7 7.6c.6.6 1.5.6 2.1 0l6.4-6.4c.6-.6.6-1.5 0-2.1l-7.6-7.7c.8-1.7 1.4-3.5 1.7-5.4l10.7-1.8c.8-.1 1.4-.8 1.4-1.6v-9c0-.8-.6-1.5-1.4-1.6z"/>
            </svg>
        </div>

        <h1>ТЕХОБСЛУЖИВАНИЕ</h1>
        <div class="status-msg" id="dynamic-text">Проверка топливных насосов...</div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <button class="btn-exit" onclick="closeApp()">Покинуть ангар</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#05070a');

        // Креатив: меняем текст статуса для атмосферы
        const messages = [
            "Калибровка орудийных систем...",
            "Замена трансмиссионного масла...",
            "Проверка бронелистов...",
            "Обновление боекомплекта...",
            "Чистка оптики...",
            "Прогрев двигателя..."
        ];

        let msgIndex = 0;
        setInterval(() => {
            msgIndex = (msgIndex + 1) % messages.length;
            const el = document.getElementById('dynamic-text');
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerText = messages[msgIndex];
                el.style.opacity = 1;
            }, 500);
        }, 3000);

        function closeApp() {
            tg.HapticFeedback.notificationOccurred('warning');
            setTimeout(() => {
                tg.close();
            }, 200);
        }
    </script>
</body>
</html>
