<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --text: #ffffff; --sub: rgba(255,255,255,0.6); }
        body { font-family: -apple-system, system-ui, sans-serif; color: var(--text); margin: 0; padding: 16px; background: #000; min-height: 100vh; padding-bottom: 110px; }
        .buy-theme { background: linear-gradient(135deg, #2d0036 0%, #000 100%); --acc: #ff00ff; }
        .sell-theme { background: linear-gradient(135deg, #3d1a00 0%, #000 100%); --acc: #ff9900; }
        .prof-theme { background: #111; --acc: #8e8e93; }

        .card { background: rgba(255,255,255,0.06); border-radius: 24px; padding: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
        input { width: 100%; box-sizing: border-box; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; background: var(--acc); color: white; font-weight: 700; cursor: pointer; }
        
        .file-box { border: 2px dashed rgba(255,255,255,0.2); border-radius: 16px; padding: 15px; text-align: center; margin: 10px 0; cursor: pointer; }
        #preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }

        .nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { background: none; border: none; color: var(--sub); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: white; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; text-align: center; }
        .hist-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: 14px; }
    </style>
</head>
<body class="buy-theme" id="bdy">

    <div id="p-buy" class="card">
        <h2>💎 Купить Gold</h2>
        <input type="number" id="i-buy" placeholder="Кол-во Gold" oninput="calc('buy')">
        <div class="file-box" onclick="document.getElementById('file-input').click()">
            <span id="file-label">📸 Скриншот лота</span>
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this)">
            <img id="preview">
        </div>
        <div style="text-align:center; margin:15px 0">
            <div style="font-size:28px; font-weight:800; color:#ff00ff" id="o-buy">0 ₽</div>
            <div style="font-size:11px; color:var(--sub); margin-top:5px">Оплата по СБП. Комиссия рынка на вас.</div>
        </div>
        <button class="btn" onclick="process('buy')">ОФОРМИТЬ ЗАКАЗ</button>
        <div style="margin-top:15px; font-size:12px; color:var(--sub); text-align:center">
            <span onclick="sendDoc('offer')">Оферта</span> | <span onclick="sendDoc('policy')">Приватность</span>
        </div>
    </div>

    <div id="p-sell" class="card" style="display:none">
        <h2>💸 Продать Gold</h2>
        <input type="number" id="i-sell" placeholder="Кол-во Gold" oninput="calc('sell')">
        <input type="text" id="s-bank" placeholder="Номер карты и название банка">
        <div style="text-align:center; margin:15px 0">
            <div style="font-size:24px; font-weight:800; color:#ff9900" id="o-sell">Вы получите: 0 ₽</div>
            <div style="font-size:11px; color:var(--sub); margin-top:5px">Выставляете на 20% больше.</div>
        </div>
        <button class="btn" onclick="process('sell')">ПРОДАТЬ</button>
    </div>

    <div id="p-prof" style="display:none">
        <div class="card" style="text-align:center">
            <h3 id="u-name">...</h3>
            <p id="u-info" style="color:var(--sub); font-size:12px; margin-top:-10px"></p>
            <div class="stats">
                <div class="stat-box"><div style="color:#ff00ff;font-weight:800" id="s-bought">0G</div><div style="font-size:9px">КУПЛЕНО</div></div>
                <div class="stat-box"><div style="color:#ff9900;font-weight:800" id="s-sold">0G</div><div style="font-size:9px">ПРОДАНО</div></div>
            </div>
        </div>
        <div class="card">
            <h4>История</h4>
            <div id="history-list"></div>
        </div>
    </div>

    <nav class="nav">
        <button id="t-buy" class="nav-btn active" onclick="setTab('buy')"><span>💎</span>Купить</button>
        <button id="t-sell" class="nav-btn" onclick="setTab('sell')"><span>💸</span>Продать</button>
        <button id="t-prof" class="nav-btn" onclick="setTab('prof')"><span>👤</span>Профиль</button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || {id: 0, first_name: 'User', username: 'none'};
        let base64Image = null;

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                document.getElementById('preview').src = base64Image;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('file-label').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }

        function calc(t) {
            const v = parseFloat(document.getElementById('i-'+t).value) || 0;
            if(t==='buy') document.getElementById('o-buy').innerText = Math.round(v * 0.55) + " ₽";
            else document.getElementById('o-sell').innerText = "Вы получите: " + Math.round(v * 0.45) + " ₽";
        }

        async function process(type) {
            const amt = document.getElementById('i-'+type).value;
            if(!amt || amt < 100) return tg.showAlert("Минимум 100 Gold");
            let payload = { method: "direct_order", user_id: user.id, amt: amt, type: type };
            if(type === 'buy') {
                if(!base64Image) return tg.showAlert("Нужен скриншот!");
                payload.image = base64Image;
            } else {
                payload.bank = document.getElementById('s-bank').value;
                if(!payload.bank) return tg.showAlert("Введите реквизиты!");
            }
            tg.MainButton.show(); tg.MainButton.setText("ОФОРМЛЕНИЕ...");
            await fetch('https://vo1dminiapp.5487n7z82j.workers.dev', { method: 'POST', body: JSON.stringify(payload) });
            tg.close();
        }

        function sendDoc(type) {
            fetch('https://vo1dminiapp.5487n7z82j.workers.dev', { 
                method: 'POST', 
                body: JSON.stringify({ method: "send_doc", user_id: user.id, doc_type: type }) 
            });
            tg.showAlert("Текст отправлен вам в чат с ботом");
        }

        function setTab(t) {
            ['buy','sell','prof'].forEach(p => {
                document.getElementById('p-'+p).style.display = p===t?'block':'none';
                document.getElementById('t-'+p).classList.toggle('active', p===t);
            });
            document.getElementById('bdy').className = t + '-theme';
            if(t === 'prof') loadData();
        }

        async function loadData() {
            const res = await fetch('https://vo1dminiapp.5487n7z82j.workers.dev', {
                method: 'POST', body: JSON.stringify({ method: "get_user_data", user_id: user.id })
            });
            const data = await res.json();
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-info').innerText = `@${user.username || ''} | ID: ${user.id}`;
            document.getElementById('s-bought').innerText = (data.stats.bought || 0) + "G";
            document.getElementById('s-sold').innerText = (data.stats.sold || 0) + "G";
            document.getElementById('history-list').innerHTML = data.history.map(h => `
                <div class="hist-item">
                    <div><b>${h.amt} G</b><br><small>${h.type==='buy'?'Покупка':'Продажа'}</small></div>
                    <div style="color:${h.status==='Completed'?'#00ff88':'#ffcc00'}">${h.status==='Completed'?'ВЫПОЛНЕНО':'В ПРОЦЕССЕ'}</div>
                </div>
            `).join('') || "История пуста";
        }
    </script>
</body>
</html>
