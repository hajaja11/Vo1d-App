<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VO1D | UNDER CONSTRUCTION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050208;
            --accent-1: #9d00ff; /* Фиолетовый */
            --accent-2: #ff9d00; /* Оранжевый */
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        /* Фоновый градиентный шум */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--accent-1);
            filter: blur(120px);
            opacity: 0.2;
            z-index: -1;
            border-radius: 50%;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        /* Анимация загрузки */
        .loader-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 40px;
        }

        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-radius: 50%;
            border-top-color: var(--accent-1);
            animation: spin 1.5s linear infinite;
        }

        .ring:nth-child(2) {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-top-color: var(--accent-2);
            animation: spin 2s linear infinite reverse;
        }

        .logo-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 2px;
            color: var(--text);
            animation: pulse 2s ease-in-out infinite;
        }

        /* Текст */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            opacity: 0.6;
            max-width: 250px;
            line-height: 1.5;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="loader-container">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="logo-text">VO1D</div>
    </div>

    <h1>MAINTENANCE</h1>
    <p>Мы обновляем систему. Приложение временно недоступно, скоро вернемся!</p>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#050208";
        
        // Отключаем кнопку "Назад", если она была
        tg.BackButton.hide();
    </script>
</body>
</html>
